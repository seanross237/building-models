<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agent Loop Board</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f172a;
  --card: #1e293b;
  --card-head: #1a2436;
  --border: #334155;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --dim: #64748b;
  --green: #10b981;
  --amber: #f59e0b;
  --red: #ef4444;
  --blue: #3b82f6;
  --cyan: #06b6d4;
  --purple: #8b5cf6;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  overflow: hidden;
  height: 100vh;
  cursor: grab;
}
body.dragging-card { cursor: grabbing; }
body.panning { cursor: grabbing; }

#board {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

#canvas {
  position: absolute;
  top: 0; left: 0;
  transform-origin: 0 0;
  width: 10000px;
  height: 10000px;
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 24px 24px;
}

/* === CARDS === */
.card {
  position: absolute;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  overflow: hidden;
  transition: box-shadow 0.15s;
}
.card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
.card.dragging { box-shadow: 0 8px 30px rgba(0,0,0,0.5); z-index: 100; }

.card-head {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card-head);
  border-bottom: 1px solid var(--border);
  cursor: grab;
  user-select: none;
  min-height: 48px;
}
.card.dragging .card-head { cursor: grabbing; }

/* Color-coded headers */
.card.type-mission .card-head { background: rgba(239,68,68,0.12); border-bottom-color: rgba(239,68,68,0.25); }
.card.type-mission .card-title { color: #fca5a5; }
.card.type-strategy .card-head { background: rgba(245,158,11,0.12); border-bottom-color: rgba(245,158,11,0.25); }
.card.type-strategy .card-title { color: #fcd34d; }
.card.type-exploration .card-head { background: rgba(234,179,8,0.10); border-bottom-color: rgba(234,179,8,0.2); }
.card.type-exploration .card-title { color: #fde68a; }

.card-title {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  flex: 1;
}
.card-collapse {
  background: none;
  border: none;
  border-left: 1px solid var(--border);
  color: var(--dim);
  font-size: 12px;
  cursor: pointer;
  padding: 0;
  margin: -14px -16px -14px 0;
  align-self: stretch;
  width: 33%;
  min-width: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-collapse:hover { background: rgba(255,255,255,0.05); color: var(--text); }

.card-body {
  padding: 10px;
  max-height: 500px;
  overflow-y: auto;
  font-size: 12px;
  line-height: 1.55;
}
.card-body::-webkit-scrollbar { width: 11px; }
.card-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.card-body::-webkit-scrollbar-thumb:hover { background: var(--dim); }
.card-body { overflow-x: hidden; }
.card-body.hidden { display: none; }

/* === BADGES === */
.badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge-active { background: rgba(6,182,212,0.15); color: var(--cyan); }
.badge-completed { background: rgba(16,185,129,0.15); color: var(--green); }
.badge-succeeded { background: rgba(16,185,129,0.15); color: var(--green); }
.badge-failed { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-partial, .badge-inconclusive { background: rgba(245,158,11,0.15); color: var(--amber); }
.badge-in_progress { background: rgba(59,130,246,0.15); color: var(--blue); }
.badge-exhausted, .badge-idle, .badge-pending { background: rgba(100,116,139,0.12); color: var(--dim); }

/* === CARD CONTENT === */
.info-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 2px 10px;
  margin-bottom: 8px;
  font-size: 11px;
}
.info-label { color: var(--dim); }
.info-value { color: var(--muted); }

.direction-row {
  padding: 4px 8px;
  margin: 2px 0;
  background: rgba(255,255,255,0.02);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  border-left: 2px solid var(--dim);
}
.direction-row.s-active { border-left-color: var(--cyan); }
.direction-row.s-succeeded { border-left-color: var(--green); }
.direction-row.s-exhausted { border-left-color: var(--dim); }
.direction-row.s-failed { border-left-color: var(--red); }

.exp-row {
  padding: 4px 8px;
  margin: 2px 0;
  background: rgba(255,255,255,0.02);
  border-radius: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  border-left: 2px solid var(--dim);
}
.exp-row.s-succeeded { border-left-color: var(--green); }
.exp-row.s-failed { border-left-color: var(--red); }
.exp-row.s-partial { border-left-color: var(--amber); }
.exp-row.s-in_progress { border-left-color: var(--blue); }

.exp-num { font-weight: 700; color: var(--text); min-width: 24px; }
.exp-goal { color: var(--muted); flex: 1; }

.section-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 8px 0;
}

.loop-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}
.loop-dot.on { background: var(--green); animation: pulse 2s infinite; }
.loop-dot.off { background: var(--dim); }
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }

/* === MARKDOWN === */
.md { color: var(--muted); }
.md h1 { font-size: 15px; color: var(--text); margin: 12px 0 6px; }
.md h2 { font-size: 13px; color: var(--text); margin: 10px 0 4px; }
.md h3 { font-size: 12px; color: var(--text); margin: 8px 0 3px; }
.md p { margin: 4px 0; }
.md code { background: var(--bg); padding: 1px 4px; border-radius: 2px; font-size: 11px; }
.md pre { background: var(--bg); padding: 8px; border-radius: 4px; overflow-x: auto; margin: 4px 0; border: 1px solid var(--border); }
.md pre code { padding: 0; background: none; }
.md ul, .md ol { padding-left: 16px; margin: 3px 0; }
.md li { margin: 1px 0; }
.md blockquote { border-left: 2px solid var(--border); padding-left: 8px; color: var(--dim); }
.md strong { color: var(--text); }
.md table { border-collapse: collapse; margin: 4px 0; width: 100%; }
.md th, .md td { border: 1px solid var(--border); padding: 3px 6px; font-size: 11px; }
.md th { background: var(--bg); color: var(--text); }
.md hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

/* === TOOLBAR === */
#toolbar {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 14px;
  font-size: 10px;
  color: var(--dim);
  z-index: 50;
  white-space: nowrap;
  user-select: none;
}
#connections-svg {
  position: absolute;
  top: -5000px; left: -5000px;
  width: 20000px;
  height: 20000px;
  pointer-events: none;
  z-index: 0;
}
#connections-svg path {
  filter: drop-shadow(0 0 2px rgba(0,0,0,0.4));
}
#status-dot {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--green);
  margin-right: 6px;
  vertical-align: middle;
}
</style>
</head>
<body>
<div id="board">
  <div id="canvas"></div>
</div>
<div id="toolbar">
  <span id="status-dot"></span>
  Drag title bars to move &middot; Scroll to zoom &middot; Drag background to pan
  &middot; <span id="updated"></span>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ── Storage ──
const SK = 'agent-board-positions-v12';
const CK = 'agent-board-collapsed-v9';
const VK = 'agent-board-viewport-v2';

let positions = JSON.parse(localStorage.getItem(SK) || '{}');
let collapsedSet = new Set(JSON.parse(localStorage.getItem(CK) || '[]'));
let viewport = JSON.parse(localStorage.getItem(VK) || '{"x":0,"y":0,"z":0.85}');

function savePositions() { localStorage.setItem(SK, JSON.stringify(positions)); }
function saveCollapsed() { localStorage.setItem(CK, JSON.stringify([...collapsedSet])); }
function saveViewport() { localStorage.setItem(VK, JSON.stringify(viewport)); }

// ── Canvas ──
const board = document.getElementById('board');
const canvas = document.getElementById('canvas');

function applyViewport() {
  canvas.style.transform = `translate(${viewport.x}px,${viewport.y}px) scale(${viewport.z})`;
}
applyViewport();

// ── Helpers ──
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function mdRender(text) {
  if (!text || !text.trim()) return '<em style="color:var(--dim)">Empty</em>';
  try { return marked.parse(text); } catch { return '<pre>' + esc(text) + '</pre>'; }
}

// ── Drag / Pan / Zoom ──
let drag = null; // { type:'card'|'pan', id?, sx, sy, ox, oy }

board.addEventListener('pointerdown', e => {
  const head = e.target.closest('.card-head');
  if (head && !e.target.closest('.card-collapse')) {
    const card = head.closest('.card');
    const id = card.dataset.id;
    drag = { type: 'card', id, el: card, sx: e.clientX, sy: e.clientY,
             ox: positions[id]?.x || 0, oy: positions[id]?.y || 0 };
    card.classList.add('dragging');
    document.body.classList.add('dragging-card');
    e.preventDefault();
  } else if (!e.target.closest('.card')) {
    drag = { type: 'pan', sx: e.clientX - viewport.x, sy: e.clientY - viewport.y };
    document.body.classList.add('panning');
    e.preventDefault();
  }
});

window.addEventListener('pointermove', e => {
  if (!drag) return;
  if (drag.type === 'card') {
    const dx = (e.clientX - drag.sx) / viewport.z;
    const dy = (e.clientY - drag.sy) / viewport.z;
    const nx = drag.ox + dx;
    const ny = drag.oy + dy;
    drag.el.style.left = nx + 'px';
    drag.el.style.top = ny + 'px';
    positions[drag.id] = { x: nx, y: ny };
    if (lastState) updateConnections(lastState);
  } else if (drag.type === 'pan') {
    viewport.x = e.clientX - drag.sx;
    viewport.y = e.clientY - drag.sy;
    applyViewport();
  }
});

window.addEventListener('pointerup', () => {
  if (!drag) return;
  if (drag.type === 'card') {
    drag.el.classList.remove('dragging');
    document.body.classList.remove('dragging-card');
    savePositions();
  } else {
    document.body.classList.remove('panning');
    saveViewport();
  }
  drag = null;
});

board.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.98 : 1.02;
  const newZ = Math.min(2, Math.max(0.15, viewport.z * factor));
  // Zoom toward cursor
  const rect = board.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  viewport.x = cx - (cx - viewport.x) * (newZ / viewport.z);
  viewport.y = cy - (cy - viewport.y) * (newZ / viewport.z);
  viewport.z = newZ;
  applyViewport();
  saveViewport();
}, { passive: false });

// ── Collapse ──
function toggleCollapse(id, ev) {
  ev.stopPropagation();
  if (collapsedSet.has(id)) collapsedSet.delete(id); else collapsedSet.add(id);
  const body = document.querySelector(`.card[data-id="${id}"] .card-body`);
  if (body) body.classList.toggle('hidden', collapsedSet.has(id));
  const btn = document.querySelector(`.card[data-id="${id}"] .card-collapse`);
  if (btn) btn.textContent = collapsedSet.has(id) ? '\u25B8' : '\u25BE';
  saveCollapsed();
}

// ── Default positions ──
// Computed default positions — filled by computeLayout()
const computedDefaults = {};

function computeLayout(state) {
  // Staircase layout constants
  const STEP_X = 300;  // horizontal step per level
  const STEP_Y = 70;   // vertical step per exploration
  const GAP_BETWEEN_STRATEGIES = 100; // vertical gap between strategy groups

  // Mission top-left
  computedDefaults['mission'] = { x: 50, y: 50 };

  // Stats and agents off to the side
  computedDefaults['stats'] = { x: 500, y: 50 };
  const agentNames = ['missionary', 'strategizer', 'explorer', 'curator'];
  agentNames.forEach((name, i) => {
    computedDefaults['agent-' + name] = { x: 1100, y: -100 + i * 55 };
  });

  // Strategies and explorations as staircases
  let cursorY = 180; // starting y for first strategy

  state.strategies.forEach((strat, si) => {
    // Strategy card: one step right from mission
    const stratX = 50 + STEP_X;
    computedDefaults[strat.id] = { x: stratX, y: cursorY };

    // Explorations: start past strategy card's right edge, then staircase
    const expStartX = stratX + 550; // past 500px strategy card + 50px gap
    strat.explorations.forEach((exp, ei) => {
      const cardId = strat.id + '/' + exp.id;
      computedDefaults[cardId] = {
        x: expStartX + ei * STEP_X,
        y: cursorY + STEP_Y + ei * STEP_Y
      };
    });

    // Move cursor down past this strategy's explorations
    const numExps = strat.explorations.length;
    cursorY += STEP_Y + numExps * STEP_Y + GAP_BETWEEN_STRATEGIES;

    // Decisions card
    computedDefaults['decisions-' + strat.id] = { x: 50 + STEP_X, y: cursorY - GAP_BETWEEN_STRATEGIES / 2 };
  });
}

function pos(id) {
  if (!positions[id]) positions[id] = computedDefaults[id] || { x: 50, y: 50 };
  return positions[id];
}

// ── Build cards ──
function buildCards(state) {
  const cards = [];
  const s = state.stats;

  // Mission
  cards.push({
    id: 'mission', title: 'Mission', width: 390, type: 'mission', collapsed: true,
    body: `<div class="md">${mdRender(state.mission.text)}</div>`
  });

  // Stats
  cards.push({
    id: 'stats', title: 'Stats', width: 180, collapsed: true,
    body: `<div class="info-grid">
      <span class="info-label">Time</span><span class="info-value">${esc(s.time_running)}</span>
      <span class="info-label">Resets</span><span class="info-value">${s.context_resets}</span>
      <span class="info-label">Explorations</span><span class="info-value">${s.total_explorations}</span>
      <span class="info-label">Success</span><span class="info-value">${esc(s.success_rate)}</span>
      <span class="info-label">Inbox</span><span class="info-value">${state.library_inbox.count}</span>
    </div>`
  });

  // Strategies
  state.strategies.forEach((strat, si) => {
    const st = strat.state || {};
    const ls = strat.loop_state || {};
    const loopOn = ls.active === true;

    let directionsHtml = (st.directions_tried || []).map(d =>
      `<div class="direction-row s-${d.status||'pending'}">
        <span style="color:var(--muted);flex:1">${esc(d.name)}</span>
        <span class="badge badge-${d.status||'pending'}">${esc(d.status||'pending')}</span>
      </div>`).join('') || '<em style="color:var(--dim)">None yet</em>';

    const completedMap = {};
    (st.explorations_completed || []).forEach(e => { completedMap[e.id] = e; });

    let explHtml = strat.explorations.map(exp => {
      const num = exp.id.replace('exploration-', '');
      let status = 'pending', goal = '';
      const c = completedMap[exp.id];
      if (c) { status = c.outcome || 'unknown'; goal = c.goal_summary || ''; }
      else if (st.current_exploration === exp.id) status = 'in_progress';
      if (!goal && exp.goal) {
        for (const l of exp.goal.split('\n')) {
          if (l.startsWith('# ')) { goal = l.replace(/^# /,'').replace(/^Exploration \d+:\s*/,''); break; }
        }
      }
      return `<div class="exp-row s-${status}">
        <span class="exp-num">${esc(num)}</span>
        <span class="exp-goal">${esc(goal||'...')}</span>
        <span class="badge badge-${status}">${esc(status.replace('_',' '))}</span>
      </div>`;
    }).join('') || '<em style="color:var(--dim)">None yet</em>';

    const stratTitle = strat.strategy_md ?
      (strat.strategy_md.match(/^# (.+)/m) || ['','Strategy'])[1] : strat.id;

    cards.push({
      id: strat.id, title: stratTitle, badge: strat.status, width: 500, collapsed: true, type: 'strategy',
      body: `
        <div class="info-grid">
          <span class="info-label">Status</span>
          <span><span class="loop-dot ${loopOn?'on':'off'}"></span>${esc(strat.status)} &middot; iter ${st.iteration||0}</span>
          <span class="info-label">Loop</span>
          <span class="info-value">${loopOn?'active':'inactive'} (${ls.iteration||0}/${ls.max_iterations||'?'})</span>
          <span class="info-label">Direction</span>
          <span class="info-value">${esc(st.current_direction||'none')}</span>
        </div>
        <hr class="section-divider">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--dim);margin-bottom:4px">Directions</div>
        ${directionsHtml}
        <hr class="section-divider">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--dim);margin-bottom:4px">Explorations</div>
        ${explHtml}
        <hr class="section-divider">
        <div class="md">${mdRender(strat.strategy_md)}</div>`
    });

    // Exploration cards
    strat.explorations.forEach((exp, ei) => {
      const cardId = strat.id + '/' + exp.id;
      const num = exp.id.replace('exploration-','');
      let status = 'pending', goalSum = '', finding = '';
      const c = completedMap[exp.id];
      if (c) { status = c.outcome||'unknown'; goalSum = c.goal_summary||''; finding = c.key_finding||''; }
      else if (st.current_exploration === exp.id) status = 'in_progress';
      if (!goalSum && exp.goal) {
        for (const l of exp.goal.split('\n')) {
          if (l.startsWith('# ')) { goalSum = l.replace(/^# /,'').replace(/^Exploration \d+:\s*/,''); break; }
        }
      }

      let bodyParts = [];
      bodyParts.push(`<div class="info-grid">
        <span class="info-label">Status</span><span><span class="badge badge-${status}">${esc(status.replace('_',' '))}</span></span>
        <span class="info-label">Goal</span><span class="info-value">${esc(goalSum)}</span>
        ${finding ? `<span class="info-label">Finding</span><span class="info-value" style="font-style:italic">${esc(finding)}</span>` : ''}
      </div>`);
      if (exp.goal) bodyParts.push(`<hr class="section-divider"><div class="md">${mdRender(exp.goal)}</div>`);
      if (exp.report_summary) bodyParts.push(`<hr class="section-divider"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--dim);margin-bottom:4px">Summary</div><div class="md">${mdRender(exp.report_summary)}</div>`);
      if (exp.report) bodyParts.push(`<hr class="section-divider"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--dim);margin-bottom:4px">Full Report</div><div class="md">${mdRender(exp.report)}</div>`);
      if (!exp.report && !exp.report_summary) bodyParts.push('<div style="color:var(--dim);font-style:italic;margin-top:6px">Report pending...</div>');

      cards.push({
        id: cardId, title: `Exploration ${num}`, badge: status, width: 360, collapsed: true, type: 'exploration',
        body: bodyParts.join('')
      });
    });

    // Decisions card
    if (strat.decisions && strat.decisions.trim().length > 20) {
      cards.push({
        id: 'decisions-' + strat.id, title: 'Decisions', width: 400,
        collapsed: true,
        body: `<div class="md">${mdRender(strat.decisions)}</div>`
      });
    }
  });

  // Agent cards (collapsed by default)
  for (const [name, prompt] of Object.entries(state.agents)) {
    const label = name.charAt(0).toUpperCase() + name.slice(1);
    cards.push({
      id: 'agent-' + name, title: label + ' Prompt', width: 320,
      collapsed: true,
      body: `<div class="md">${mdRender(prompt)}</div>`
    });
  }

  return cards;
}

// ── Connections ──
function getCardBounds(id) {
  const el = document.querySelector(`.card[data-id="${id}"]`);
  if (!el) return null;
  const p = positions[id] || {x: 0, y: 0};
  return { x: p.x, y: p.y, w: el.offsetWidth, h: el.offsetHeight };
}

function updateConnections(state) {
  const svg = document.getElementById('connections-svg');
  if (!svg) return;
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  const connections = [];
  state.strategies.forEach(strat => {
    connections.push({ from: 'mission', to: strat.id, color: '#ef4444' });
    strat.explorations.forEach(exp => {
      connections.push({ from: strat.id, to: strat.id + '/' + exp.id, color: '#f59e0b' });
    });
  });

  connections.forEach(conn => {
    const from = getCardBounds(conn.from);
    const to = getCardBounds(conn.to);
    if (!from || !to) return;

    const x1 = from.x + from.w;
    const y1 = from.y + from.h / 2;
    const x2 = to.x;
    const y2 = to.y + to.h / 2;
    const cpx = (x1 + x2) / 2;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${x1} ${y1} C ${cpx} ${y1}, ${cpx} ${y2}, ${x2} ${y2}`);
    path.setAttribute('stroke', conn.color);
    path.setAttribute('stroke-width', '2');
    path.setAttribute('fill', 'none');
    path.setAttribute('opacity', '0.35');
    path.setAttribute('stroke-linecap', 'round');
    svg.appendChild(path);
  });
}

// ── Render ──
let lastState = null;
let initialized = false;

function renderBoard(state) {
  if (drag) return; // Don't re-render mid-drag
  lastState = state;
  computeLayout(state);
  const cards = buildCards(state);
  const canvas = document.getElementById('canvas');

  // Init collapsed defaults on first load
  if (!initialized) {
    cards.forEach(c => {
      if (c.collapsed) collapsedSet.add(c.id);
    });
    saveCollapsed();
    initialized = true;
  }

  const svgHtml = '<svg id="connections-svg" viewBox="-5000 -5000 20000 20000"></svg>';
  canvas.innerHTML = svgHtml + cards.map((c, i) => {
    const p = pos(c.id);
    const collapsed = collapsedSet.has(c.id);
    const arrow = collapsed ? '\u25B8' : '\u25BE';
    const badgeHtml = c.badge ? `<span class="badge badge-${c.badge}">${esc(c.badge.replace('_',' '))}</span>` : '';
    const typeClass = c.type ? ' type-' + c.type : '';

    return `<div class="card${typeClass}" data-id="${c.id}" style="left:${p.x}px;top:${p.y}px;width:${c.width}px">
      <div class="card-head">
        <span class="card-title">${esc(c.title)}</span>
        ${badgeHtml}
        <button class="card-collapse" onclick="toggleCollapse('${c.id}',event)">${arrow}</button>
      </div>
      <div class="card-body${collapsed?' hidden':''}">${c.body}</div>
    </div>`;
  }).join('');

  updateConnections(state);
  document.getElementById('updated').textContent = new Date().toLocaleTimeString();
}

// ── Poll ──
async function fetchAndRender() {
  try {
    const res = await fetch('/api/state');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    renderBoard(await res.json());
  } catch (err) {
    document.getElementById('updated').textContent = 'Error: ' + err.message;
  }
}

fetchAndRender();
setInterval(fetchAndRender, 10000);
</script>
