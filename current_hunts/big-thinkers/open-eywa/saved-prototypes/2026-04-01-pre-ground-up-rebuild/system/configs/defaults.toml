[orchestrator]
poll_interval_seconds = 10
max_depth = 5
plan_threshold = 30
zombie_timeout_seconds = 180
background_timeout_seconds = 1800
max_status_chain = 10

[runtime]
api_base_url = "https://openrouter.ai/api/v1"
chat_endpoint = "/chat/completions"
timeout_seconds = 120
max_iterations = 12
temperature = 0.2
max_completion_tokens = 4000
tool_output_preview_chars = 1200
app_name = "Open-Eywa"
app_url = "https://example.invalid/open-eywa"

[logging]
split_tool_log = true

[roles]
librarian = "openai/gpt-4o-mini"
planner = "openai/gpt-4o-mini"
worker = "openai/gpt-4o-mini"
plan-reviewer = "openai/gpt-4o-mini"
plan-decider = "openai/gpt-4o-mini"
mid-plan-evaluator = "openai/gpt-4o-mini"
synthesizer = "openai/gpt-4o-mini"

[tool_profiles.read_write]
tools = ["read_file", "write_file", "edit_file", "glob", "grep"]

[tool_profiles.reader]
tools = ["read_file", "glob", "grep"]

[tool_profiles.worker]
tools = [
  "read_file",
  "write_file",
  "edit_file",
  "glob",
  "grep",
  "run_shell",
  "run_python",
  "run_sage",
  "run_lean",
  "start_background_job",
  "check_background_job",
  "cancel_background_job",
]

[tool_assignment]
librarian = "reader"
planner = "read_write"
worker = "worker"
plan-reviewer = "reader"
plan-decider = "read_write"
mid-plan-evaluator = "read_write"
synthesizer = "read_write"
