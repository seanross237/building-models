<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="data:,">
  <title>Serenade Voice Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a2e;
      flex-shrink: 0;
    }
    .header h1 { font-size: 16px; font-weight: 600; color: #a78bfa; }
    .header-actions { display: flex; gap: 8px; }
    .header-btn {
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      color: #a0a0b0;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .header-btn:active { background: #2a2a4e; }

    .transcript {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.45;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #4c1d95;
      color: #e8e0ff;
      border-bottom-right-radius: 4px;
    }
    .msg.agent {
      align-self: flex-start;
      background: #1a1a2e;
      color: #d0d0e0;
      border-bottom-left-radius: 4px;
    }
    .msg .timing {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }

    /* Activity Log */
    .activity-log {
      flex-shrink: 0;
      border-top: 1px solid #1a1a2e;
      background: #0d0d14;
      max-height: 120px;
      overflow-y: auto;
      transition: max-height 0.2s ease;
      cursor: pointer;
      -webkit-overflow-scrolling: touch;
    }
    .activity-log.collapsed {
      max-height: 32px;
      overflow: hidden;
    }
    .activity-log-inner {
      padding: 4px 12px;
      font-family: "SF Mono", "Menlo", monospace;
      font-size: 11px;
      line-height: 1.6;
    }
    .log-entry { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-entry .ts { color: #555; margin-right: 6px; }
    .log-entry.info { color: #666; }
    .log-entry.progress { color: #f59e0b; }
    .log-entry.success { color: #22c55e; }
    .log-entry.error { color: #ef4444; }

    .status-line {
      text-align: center;
      font-size: 14px;
      color: #f59e0b;
      padding: 4px 16px 0;
      min-height: 22px;
      flex-shrink: 0;
    }
    .status-line:empty { display: none; }
    .status-line.speaking { cursor: pointer; }

    .controls {
      padding: 12px 16px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .mic-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid #2a2a4e;
      background: #1a1a2e;
      color: #a78bfa;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .mic-btn:active { transform: scale(0.95); }
    .mic-btn.recording {
      border-color: #ef4444;
      background: #3f1111;
      color: #ef4444;
      animation: pulse 1.5s infinite;
    }
    .mic-btn.disabled { opacity: 0.4; pointer-events: none; }
    .mic-btn.cancel-mode {
      border-color: #f59e0b;
      background: #2f2510;
      color: #f59e0b;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3); }
      50% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
    }

    .text-input-row {
      display: flex;
      gap: 8px;
      padding: 0 16px 12px;
      flex-shrink: 0;
    }
    .text-input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      color: #e0e0e0;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
    }
    .text-input::placeholder { color: #555; }
    .send-btn {
      background: #4c1d95;
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
    }
    .send-btn:disabled { opacity: 0.4; }

    .auth-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
    }
    .auth-overlay h2 { color: #a78bfa; font-size: 20px; }
    .auth-overlay input {
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      color: #e0e0e0;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 16px;
      width: 260px;
      text-align: center;
      outline: none;
    }
    .auth-overlay button {
      background: #4c1d95;
      border: none;
      color: white;
      padding: 12px 32px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    /* Server Logs Modal */
    .logs-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: none;
      flex-direction: column;
    }
    .logs-modal-overlay.open { display: flex; }
    .logs-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid #2a2a4e;
      flex-shrink: 0;
    }
    .logs-modal-header h2 { font-size: 16px; color: #a78bfa; }
    .logs-modal-header .btn-group { display: flex; gap: 8px; }
    .logs-modal-header button {
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      color: #a0a0b0;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .logs-modal-header button:active { background: #2a2a4e; }
    .logs-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      font-family: "SF Mono", "Menlo", monospace;
      font-size: 11px;
      line-height: 1.7;
      -webkit-overflow-scrolling: touch;
    }
    .server-log-entry { white-space: pre-wrap; word-break: break-all; }
    .server-log-entry.error { color: #ef4444; }
    .server-log-entry.warn { color: #f59e0b; }
    .server-log-entry.info { color: #888; }
  </style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <h2>Serenade Voice Agent</h2>
  <input type="password" id="tokenInput" placeholder="Enter auth token" autocomplete="off">
  <button onclick="saveToken()">Connect</button>
</div>

<div class="header">
  <h1>Serenade Agent</h1>
  <div class="header-actions">
    <button class="header-btn" id="newBtn" onclick="newSession()" style="display:none">New</button>
    <button class="header-btn" onclick="openLogsModal()">Logs</button>
    <button class="header-btn" onclick="pullRepo()">Pull</button>
  </div>
</div>

<div class="transcript" id="transcript"></div>

<div class="activity-log collapsed" id="activityLog" onclick="toggleActivityLog()">
  <div class="activity-log-inner" id="activityLogInner"></div>
</div>

<div id="statusLine" class="status-line"></div>

<div class="controls">
  <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>
</div>

<div class="text-input-row">
  <input class="text-input" id="textInput" type="text" placeholder="Or type a message..." autocomplete="off">
  <button class="send-btn" id="sendBtn" onclick="sendText()">Send</button>
</div>

<!-- Server Logs Modal -->
<div class="logs-modal-overlay" id="logsModal">
  <div class="logs-modal-header">
    <h2>Server Logs</h2>
    <div class="btn-group">
      <button onclick="refreshLogs()">Refresh</button>
      <button onclick="closeLogsModal()">Close</button>
    </div>
  </div>
  <div class="logs-modal-body" id="logsModalBody">Loading...</div>
</div>

<script>
  let authToken = localStorage.getItem("voice-agent-token") || "";
  let sessionId = localStorage.getItem("voice-agent-session") || null;
  let recording = false;
  let mediaRecorder = null;
  let audioChunks = [];
  let activeTimer = null;
  let logExpanded = false;
  let processing = false;
  let cancelled = false;
  let currentFetchController = null;
  let pendingPlayHandler = null;
  const micSVG = '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
  const cancelSVG = '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  const newBtn = document.getElementById("newBtn");

  function updateNewBtn() {
    newBtn.style.display = sessionId ? "" : "none";
  }
  updateNewBtn();

  const FETCH_TIMEOUT_MS = 90000;

  // Warm up audio context on first user tap (iOS autoplay fix)
  let audioCtxWarmed = false;
  function warmAudioContext() {
    if (audioCtxWarmed) return;
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    audioCtxWarmed = true;
  }
  document.addEventListener("touchstart", warmAudioContext, { once: true });
  document.addEventListener("click", warmAudioContext, { once: true });

  const transcript = document.getElementById("transcript");
  const micBtn = document.getElementById("micBtn");
  const textInput = document.getElementById("textInput");
  const sendBtn = document.getElementById("sendBtn");
  const authOverlay = document.getElementById("authOverlay");
  const activityLog = document.getElementById("activityLog");
  const activityLogInner = document.getElementById("activityLogInner");
  const statusLine = document.getElementById("statusLine");

  function setStatus(text) { statusLine.textContent = text; }
  function clearStatus() { statusLine.textContent = ""; }

  if (authToken) authOverlay.style.display = "none";

  function saveToken() {
    const val = document.getElementById("tokenInput").value.trim();
    if (!val) return;
    authToken = val;
    localStorage.setItem("voice-agent-token", val);
    authOverlay.style.display = "none";
  }

  document.getElementById("tokenInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") saveToken();
  });

  // --- Activity Log ---
  function logTime() {
    const d = new Date();
    return d.toLocaleTimeString("en-US", { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function addLogEntry(text, level = "info") {
    const entry = document.createElement("div");
    entry.className = `log-entry ${level}`;
    entry.innerHTML = `<span class="ts">${logTime()}</span>${escapeHtml(text)}`;
    activityLogInner.appendChild(entry);
    // Keep max 50 entries
    while (activityLogInner.children.length > 50) {
      activityLogInner.removeChild(activityLogInner.firstChild);
    }
    activityLog.scrollTop = activityLog.scrollHeight;
    // Auto-expand when new entries arrive during activity
    if (activityLog.classList.contains("collapsed")) {
      activityLog.classList.remove("collapsed");
      logExpanded = true;
    }
  }

  function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function toggleActivityLog() {
    logExpanded = !logExpanded;
    activityLog.classList.toggle("collapsed", !logExpanded);
  }

  // Start an elapsed timer log entry, returns update/stop functions
  function startTimerEntry(text) {
    const start = Date.now();
    addLogEntry(`${text}...`, "progress");
    const entry = activityLogInner.lastChild;
    const timer = setInterval(() => {
      const elapsed = ((Date.now() - start) / 1000).toFixed(0);
      entry.innerHTML = `<span class="ts">${logTime()}</span>${escapeHtml(text)}... ${elapsed}s`;
    }, 1000);
    return {
      stop(finalText, level = "success") {
        clearInterval(timer);
        const elapsed = ((Date.now() - start) / 1000).toFixed(1);
        entry.className = `log-entry ${level}`;
        entry.innerHTML = `<span class="ts">${logTime()}</span>${escapeHtml(finalText)} (${elapsed}s)`;
      },
      fail(errText) {
        clearInterval(timer);
        const elapsed = ((Date.now() - start) / 1000).toFixed(1);
        entry.className = "log-entry error";
        entry.innerHTML = `<span class="ts">${logTime()}</span>${escapeHtml(errText)} (${elapsed}s)`;
      }
    };
  }

  // Log server steps from response
  function logServerSteps(steps) {
    if (!steps || !steps.length) return;
    for (const s of steps) {
      const ms = s.ms ? `${(s.ms / 1000).toFixed(1)}s` : "";
      const detail = s.detail || "";
      if (s.status === "ok") {
        addLogEntry(`${s.step.toUpperCase()}: ${ms} — ${detail}`, "success");
      } else {
        addLogEntry(`${s.step.toUpperCase()} FAILED: ${detail}`, "error");
      }
    }
  }

  // --- Fetch with timeout and error handling ---
  async function fetchWithTimeout(url, options = {}) {
    const controller = new AbortController();
    currentFetchController = controller;
    const timeout = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);
    options.signal = controller.signal;

    try {
      const response = await fetch(url, options);
      clearTimeout(timeout);

      // Try to parse JSON, handle non-JSON responses
      let data;
      const contentType = response.headers.get("content-type") || "";
      if (contentType.includes("application/json")) {
        try {
          data = await response.json();
        } catch (parseErr) {
          throw new Error(`JSON parse error (HTTP ${response.status})`);
        }
      } else {
        const text = await response.text();
        if (!response.ok) {
          throw new Error(`Server error (${response.status}): ${text.slice(0, 200)}`);
        }
        // Try JSON parse on text anyway
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error(`Unexpected response (${response.status}): ${text.slice(0, 200)}`);
        }
      }

      if (!response.ok && data.error) {
        throw Object.assign(new Error(data.error), { status: response.status, steps: data.steps, data });
      }
      if (!response.ok) {
        throw Object.assign(new Error(`HTTP ${response.status}`), { status: response.status, data });
      }

      return data;
    } catch (err) {
      clearTimeout(timeout);
      if (err.name === "AbortError") {
        if (cancelled) throw new Error("Request cancelled");
        throw new Error(`TIMEOUT — no response after ${FETCH_TIMEOUT_MS / 1000}s`);
      }
      throw err;
    }
  }

  // --- Recording ---
  async function toggleRecording() {
    if (processing) {
      cancelRequest();
      return;
    }
    if (recording) {
      stopRecording();
    } else {
      await startRecording();
    }
  }

  function cancelRequest() {
    cancelled = true;
    if (currentFetchController) {
      currentFetchController.abort();
      currentFetchController = null;
    }
    fetch("/api/cancel", {
      method: "POST",
      headers: { Authorization: `Bearer ${authToken}` },
    }).catch(() => {});
    setStatus("Cancelled");
    addLogEntry("Request cancelled", "info");
  }

  async function startRecording() {
    cleanupPendingPlay();
    clearStatus();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
        ? "audio/webm;codecs=opus"
        : MediaRecorder.isTypeSupported("audio/mp4")
          ? "audio/mp4"
          : "";

      mediaRecorder = mimeType
        ? new MediaRecorder(stream, { mimeType })
        : new MediaRecorder(stream);

      audioChunks = [];
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach((t) => t.stop());
        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
        sendVoice(blob);
      };
      mediaRecorder.start();
      recording = true;
      micBtn.classList.add("recording");
      addLogEntry("Recording...", "progress");
    } catch (err) {
      addLogEntry("Mic access denied", "error");
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
      mediaRecorder.stop();
    }
    recording = false;
    micBtn.classList.remove("recording");
  }

  // --- Send voice ---
  async function sendVoice(blob) {
    disableControls(true);
    const sizeKB = Math.round(blob.size / 1024);

    try {
      // Step 1: Transcribe
      setStatus("Transcribing...");
      const sttTimer = startTimerEntry("Transcribing");
      let userText;
      try {
        const formData = new FormData();
        formData.append("audio", blob, "recording.webm");

        const sttData = await fetchWithTimeout("/api/transcribe", {
          method: "POST",
          headers: { Authorization: `Bearer ${authToken}` },
          body: formData,
        });

        userText = sttData.userText;
        sttTimer.stop(`Transcribed: "${userText.slice(0, 60)}${userText.length > 60 ? "..." : ""}"`);
        addMessage("user", userText);
      } catch (err) {
        sttTimer.fail("Transcription failed: " + err.message);
        if (!cancelled) addMessage("agent", "Error: " + err.message);
        clearStatus();
        return;
      }

      // Step 2: Send to Claude (reuse text endpoint)
      setStatus("Claude is thinking...");
      const claudeTimer = startTimerEntry("Claude is thinking");
      try {
        const data = await fetchWithTimeout("/api/text", {
          method: "POST",
          headers: {
            Authorization: `Bearer ${authToken}`,
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ text: userText, sessionId }),
        });

        claudeTimer.stop("Claude responded");
        logServerSteps(data.steps);
        handleResponse(data);
      } catch (err) {
        clearStatus();
        claudeTimer.fail("Claude failed: " + err.message);
        if (err.steps) logServerSteps(err.steps);
        if (!cancelled) {
          if (err.data && err.data.claudeText) {
            handleResponse(err.data);
          } else {
            addMessage("agent", "Error: " + err.message);
          }
        }
      }
    } finally {
      cancelled = false;
      disableControls(false);
    }
  }

  // --- Send text ---
  async function sendText() {
    const text = textInput.value.trim();
    if (!text) return;
    textInput.value = "";
    addMessage("user", text);
    disableControls(true);

    setStatus("Claude is thinking...");
    const timer = startTimerEntry("Claude is thinking");

    try {
      const data = await fetchWithTimeout("/api/text", {
        method: "POST",
        headers: {
          Authorization: `Bearer ${authToken}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ text, sessionId }),
      });

      timer.stop("Claude responded");
      logServerSteps(data.steps);
      handleResponse(data);
    } catch (err) {
      clearStatus();
      timer.fail("Claude failed: " + err.message);
      if (err.steps) logServerSteps(err.steps);
      if (!cancelled) {
        if (err.data && err.data.claudeText) {
          handleResponse(err.data);
        } else {
          addMessage("agent", "Error: " + err.message);
        }
      }
    } finally {
      cancelled = false;
      disableControls(false);
    }
  }

  textInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendText();
    }
  });

  // --- Handle response (shared by voice and text) ---
  function handleResponse(data) {
    // Update session
    if (data.sessionId) {
      sessionId = data.sessionId;
      localStorage.setItem("voice-agent-session", sessionId);
      updateNewBtn();
    }

    // Show agent text immediately
    addMessage("agent", data.claudeText, data.timing);

    // Fetch and play audio separately
    if (data.audioId) {
      setStatus("Speaking... (tap to stop)");
      statusLine.classList.add("speaking");
      statusLine.onclick = () => { stopAudio(); statusLine.onclick = null; statusLine.classList.remove("speaking"); };
      playAudioFromId(data.audioId);
    } else {
      clearStatus();
      // Check if TTS failed from steps
      const ttsStep = (data.steps || []).find(s => s.step === "tts" && s.status === "error");
      if (ttsStep) {
        addLogEntry(`TTS failed: ${ttsStep.detail} (text shown)`, "error");
      }
    }
  }

  // --- Message rendering ---
  function addMessage(role, text, timing) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.textContent = text;
    if (timing) {
      const t = document.createElement("div");
      t.className = "timing";
      const parts = [];
      if (timing.sttMs) parts.push(`STT ${(timing.sttMs / 1000).toFixed(1)}s`);
      if (timing.claudeMs) parts.push(`Claude ${(timing.claudeMs / 1000).toFixed(1)}s`);
      if (timing.ttsMs) parts.push(`TTS ${(timing.ttsMs / 1000).toFixed(1)}s`);
      if (timing.totalMs) parts.push(`Total ${(timing.totalMs / 1000).toFixed(1)}s`);
      t.textContent = parts.join(" | ");
      div.appendChild(t);
    }
    transcript.appendChild(div);
    transcript.scrollTop = transcript.scrollHeight;
    return div;
  }

  // --- Audio playback ---
  let currentAudio = null;

  function stopAudio() {
    cleanupPendingPlay();
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.src = "";
      currentAudio = null;
      clearStatus();
      addLogEntry("Audio stopped", "info");
    }
  }

  function cleanupPendingPlay() {
    if (pendingPlayHandler) {
      document.removeEventListener("touchstart", pendingPlayHandler);
      document.removeEventListener("click", pendingPlayHandler);
      pendingPlayHandler = null;
    }
  }

  function playAudioFromId(audioId) {
    stopAudio();
    addLogEntry("Loading audio...", "info");
    const audio = new Audio(`/api/audio/${audioId}?token=${authToken}`);
    currentAudio = audio;
    audio.oncanplaythrough = () => { addLogEntry("Speaking...", "progress"); };
    audio.onended = () => { currentAudio = null; clearStatus(); addLogEntry("Done speaking", "success"); };
    audio.onerror = () => { currentAudio = null; clearStatus(); addLogEntry("Audio failed to load", "error"); };
    audio.play().catch((err) => {
      console.error("Autoplay blocked:", err);
      setStatus("Tap to hear response");
      statusLine.classList.add("speaking");
      statusLine.onclick = null;
      addLogEntry("Tap to hear response", "info");
      const handler = (e) => {
        if (e.target.closest('.controls') || e.target.closest('.text-input-row') || e.target.closest('.header') || e.target.closest('.activity-log')) {
          return;
        }
        audio.play();
        cleanupPendingPlay();
        setStatus("Speaking... (tap to stop)");
        statusLine.onclick = () => { stopAudio(); statusLine.onclick = null; statusLine.classList.remove("speaking"); };
      };
      pendingPlayHandler = handler;
      document.addEventListener("touchstart", handler);
      document.addEventListener("click", handler);
    });
  }

  function disableControls(disabled) {
    processing = disabled;
    sendBtn.disabled = disabled;
    textInput.disabled = disabled;
    if (disabled) {
      micBtn.innerHTML = cancelSVG;
      micBtn.classList.add("cancel-mode");
    } else {
      micBtn.innerHTML = micSVG;
      micBtn.classList.remove("cancel-mode");
    }
  }

  function newSession() {
    sessionId = null;
    localStorage.removeItem("voice-agent-session");
    transcript.innerHTML = "";
    updateNewBtn();
    addLogEntry("New session started", "info");
  }

  async function pullRepo() {
    const timer = startTimerEntry("Pulling latest code");
    try {
      const data = await fetchWithTimeout("/api/pull", {
        method: "POST",
        headers: { Authorization: `Bearer ${authToken}` },
      });
      timer.stop(data.output || "Pulled");
    } catch (err) {
      timer.fail("Pull failed: " + err.message);
    }
  }

  // --- Server Logs Modal ---
  function openLogsModal() {
    document.getElementById("logsModal").classList.add("open");
    refreshLogs();
  }

  function closeLogsModal() {
    document.getElementById("logsModal").classList.remove("open");
  }

  async function refreshLogs() {
    const body = document.getElementById("logsModalBody");
    body.textContent = "Loading...";
    try {
      const data = await fetchWithTimeout("/api/logs", {
        headers: { Authorization: `Bearer ${authToken}` },
      });
      if (!data.logs || data.logs.length === 0) {
        body.textContent = "No logs yet.";
        return;
      }
      body.innerHTML = "";
      for (const entry of data.logs) {
        const div = document.createElement("div");
        div.className = `server-log-entry ${entry.level}`;
        const ts = new Date(entry.ts).toLocaleTimeString("en-US", { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
        div.textContent = `${ts} [${entry.level.toUpperCase()}] ${entry.message}`;
        body.appendChild(div);
      }
      body.scrollTop = body.scrollHeight;
    } catch (err) {
      body.textContent = "Failed to load logs: " + err.message;
    }
  }

  // --- Auto-submit from ?q= URL param (iOS Shortcut support) ---
  const urlQ = new URLSearchParams(window.location.search).get("q");
  if (urlQ && urlQ.trim()) {
    textInput.value = urlQ.trim();
    window.history.replaceState({}, "", window.location.pathname);
    sendText();
  }
</script>

</body>
