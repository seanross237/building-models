# Phase 7 publishing destinations.
#
# Every enabled destination is called in order when the user clicks
# Publish. `local_archive` is always first and always succeeds, so the
# sketch transitions to PUBLISHED even if every external destination
# fails. TikTok and X are stubs until real adapters ship.
destinations:
  - id: local_archive
    enabled: true
    adapter: publishing.adapters.local_archive.LocalArchivePublisher
    config: {}
  - id: youtube_shorts
    enabled: true
    adapter: publishing.adapters.youtube_shorts.YouTubeShortsPublisher
    config:
      default_privacy: private
      category_id: "23"
      timeout_sec: 300
  - id: tiktok
    enabled: false
    adapter: publishing.adapters.stub_publisher.StubPublisher
    config:
      id: tiktok
  - id: x
    enabled: false
    adapter: publishing.adapters.stub_publisher.StubPublisher
    config:
      id: x
