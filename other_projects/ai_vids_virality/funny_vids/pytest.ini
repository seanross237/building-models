[pytest]
markers =
    network: tests that hit the public internet (excluded from default runs with `-m "not network"`)
    llm: tests that spend real LLM tokens (excluded from default runs with `-m "not llm"`)
    gemini: tests that call the real Gemini image API (excluded from default runs with `-m "not gemini"`)
    video: tests that call real video provider APIs (excluded from default runs with `-m "not video"`)
    critic: tests that call real critic APIs (excluded from default runs with `-m "not critic"`)
    publish: tests that hit real publishing destinations (YouTube/TikTok/X) (excluded from default runs with `-m "not publish"`)
    fal: tests that call the real fal.ai API (excluded from default runs with `-m "not fal"`)
    openrouter: opt-in real OpenRouter API call (requires OPENROUTER_API_KEY)
