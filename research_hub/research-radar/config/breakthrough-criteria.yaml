# Breakthrough detection criteria for Research Radar -> Codex Atlas pipeline.
# Items meeting these thresholds are promoted into atlas-missions queue.

# Minimum relevance_score in the summary file to even consider an item.
minimum_relevance_score: 8

# Combined breakthrough score must meet or exceed this value.
breakthrough_threshold: 8.5

# Source-context bonus: items whose topic has "atlas" in source_context.
atlas_source_context_bonus: 1

# Bonus when source_context on the individual item includes "atlas".
atlas_item_context_bonus: 1

# Per-keyword bonus for science breakthrough keywords found in summary/takeaways.
keyword_bonus_per_match: 0.5

# Maximum total keyword bonus (caps accumulated keyword hits).
keyword_bonus_cap: 2.0

# Penalty applied to items analyzed in "fallback" mode (less reliable).
fallback_mode_penalty: 1.0

# Only items with this analysis mode are considered high-confidence.
high_confidence_analysis_mode: claude

# Science breakthrough keyword patterns (case-insensitive substring match).
breakthrough_keywords:
  - novel proof
  - new theorem
  - breakthrough result
  - first solution
  - state-of-the-art
  - surpasses human
  - superhuman
  - new framework for proving
  - automated discovery
  - formal verification
  - solved previously open
  - new mathematical result
  - first automated
  - rigorous proof
  - advances the frontier
  - significant improvement
  - outperforms all prior
  - novel architecture
  - paradigm shift
  - zero-shot reasoning

# Topic slugs whose source_context includes "atlas" — strong breakthrough candidates.
atlas_topic_slugs:
  - agents-solving-hard-science-problems
  - ai-systems-solving-hard-math-problems
  - ai-systems-solving-hard-physics-problems
  - autonomous-scientific-research-systems
  - agent-workflows-for-literature-plus-computation-plus-validation
  - research-agents-that-generate-test-and-refine-hypotheses
  - durable-research-loops-with-explicit-artifacts-and-evaluation
  - agent-assisted-theorem-proving
  - agent-assisted-proof-search
  - automated-literature-review-for-math-and-physics
  - adversarial-validation-for-scientific-agent-outputs
