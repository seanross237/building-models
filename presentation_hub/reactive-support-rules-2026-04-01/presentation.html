id a boo-boo"], "example_responses": ["It sounds like you like them both, which makes me happy. Yeah, totally, just go ahead and go to the other song that you like, and just put in $0 for the payment amount.", "Hehe no problem Glenna! Can you still find it? If not I can help, if you can, then just unlock that one too! Feel free to just put $0 and have it for free :)"], "notes": "Very generous policy. Sean lets them unlock additional versions for free ($0) rather than doing a swap. He frames it positively ('sounds like you like them both'). He doesn't ask them to verify their original purchase."}, {"concern_type": "edit_request", "sub_scenario": "revert_to_original_after_changes", "when": "Customer made changes to their song and now wants to go back to the original version, or wants the original style but with new content", "then": "Sean explains there's no way to perfectly replicate an existing song. He suggests using the edit box to describe the style they want. He directs them to try describing what they want and regenerate. He's empathetic about the frustration.", "confidence": "consistent", "example_count": 2, "example_quotes": ["I made some changes to the song but, now the song doesn't sound right to me. I would like to keep the first original version but adding my boys names Bryant Jr and Andre.", "I changed some lyrics and the style on the song I chose, but decided I wanted the original style with the new lyrics"], "example_responses": ["Unfortunately I can't edit the audio on an existing song \u2014 but the good news is you can generate fresh versions with whatever changes you need. Head to the review page and describe what you want in the box underneath.", "There's no way to perfectly replicate what exists in another song. Have you tried using the chat edit beneath the songs where you describe what you want?"], "notes": "Sean is honest that perfect replication is impossible. He doesn't promise the original version can be recovered if they've moved on from it. He guides them to the best available workaround (describe what you want in the edit box)."}, {"concern_type": "edit_request", "sub_scenario": "want_to_add_content_to_existing_song", "when": "Customer forgot to include something (a person, a detail) in their song and wants to add it to the existing song", "then": "Sean explains he can't edit the existing audio. He directs them to generate new versions with the added content. If they already paid, he offers $0 for the new version. He provides specific edit box instructions.", "confidence": "consistent", "example_count": 2, "example_quotes": ["I just realized that I did not include her husband in the Song. Is it still possible to include him in this song?", "I absolutely love it but I missed the section where you click to make any little tweaks"], "example_responses": ["So I can't edit the existing audio unfortunately, but the good news is you can totally generate new versions with her husband included! Since you already unlocked that song, feel free to put $0 as the price. Underneath your song versions, there's a box where you can describe what you want changed.", "I really hope this news does not make you blue"], "notes": "Same pattern as change_specific_lyrics: can't edit existing, generate new, $0 if already paid. For the Jennifer/19alwaysmine75 case, Sean's response was cut off but appears to start with a sympathetic/playful tone."}, {"concern_type": "product_issues", "sub_scenario": "song_played_once_now_broken", "when": "Customer says the song played perfectly once but now it messes up, suggesting the issue developed after initial playback", "then": "Sean follows the garbled audio pattern but additionally: (1) he says he sadly can't perfectly fix the existing song, (2) offers free new versions with $0, (3) provides a login link. For one power user, he specifically asked the customer to confirm whether the song was truly OK initially, because that diagnostic detail would be valuable.", "confidence": "consistent", "example_count": 2, "example_quotes": ["I tried sending a recording of the Song so you could hear how it messes up. I bought the 1st Version. Please Help fix it so I can have a Perfect Version for My Granddaughter", "the recording of this song is static and mumbling at the end. Can I please have it redone it was not like that when I first listened to it"], "example_responses": ["Oh no, I'm sorry about that! This is an issue that's suddenly popped up. Sadly, I won't be able to perfectly fix this song, at least not yet. The good news is you can create brand new versions for free! Just put $0 as the payment amount.", "If you are super super confident that the song was ok when you first got it, then later became corrupted, that would definitely be news, and news I would be excited to hear (because it would mean it's happening on my side, and I could do something to fix it!)"], "notes": "Sean is explicit that he CANNOT fix the existing song ('Sadly, I won't be able to perfectly fix this song'). He pushes them toward regeneration. The Pastor Ward case shows Sean's investigative side \u2014 he asks for diagnostic confirmation because it could reveal a different bug."}, {"concern_type": "product_issues", "sub_scenario": "form_submission_not_going_through", "when": "Customer reports the song creation form or submission process is not working, the song won't go through", "then": "Sean asks clarifying questions to understand what specifically is failing. He doesn't assume the issue.", "confidence": "consistent", "example_count": 1, "example_quotes": ["I've been trying to send another song for over 30 minutes, but it's not going thru. Is there a problem with your website?"], "example_responses": ["Can you expand on what you mean by send?"], "notes": "Singleton. Sean's response is short \u2014 asks for clarification rather than assuming what 'send' means. This is the diagnostic pattern: when the issue is ambiguous, Sean asks questions first."}, {"concern_type": "product_issues", "sub_scenario": "feature_request_not_a_bug", "when": "Customer asks about a feature that doesn't exist yet (voice cloning, CD burning, etc.) \u2014 tagged as product_issues but actually a feature request", "then": "Sean is honest that the feature doesn't exist yet. He expresses enthusiasm about the idea. He gives a rough timeline ('not within the next couple months'). He doesn't make promises.", "confidence": "consistent", "example_count": 2, "example_quotes": ["Would you any time in the near future be offering the option of making the songs sound like they are being sung by the person creating it?", "How can we hear this song outside of the phone, is there way to put it on a cd?"], "example_responses": ["Ooh that's a cool idea! It's technically possible and something I'd love to build, just haven't gotten to it yet. Definitely on the radar though. I wouldn't expect it within the next couple of months though unfortunately.", "I don't offer a physical CD right now, but you could download it as an MP3 file and burn it to a CD. Most things these days that can play music should have bluetooth."], "notes": "Sean validates the idea, is honest about timelines, and suggests workarounds where possible."}, {"concern_type": "edit_request", "sub_scenario": "remove_word_or_content_from_song", "when": "Customer wants a specific word, name, or line removed from their song", "then": "No response data available (all instances were unanswered), but based on Sean's consistent pattern for edit requests, the expected response would be: can't edit existing audio, direct them to the edit box to regenerate with the unwanted content removed, offer $0 if already paid.", "confidence": "uncertain", "example_count": 3, "example_quotes": ["I don't want the words 'our fool' in it", "I recently sent a song that has been unlocked. I love it but I would like his name taken out.", "Can you remove the line about shirt collection"], "example_responses": [], "notes": "All 3 instances were unanswered by Sean. Based on the consistent pattern across ALL other edit requests, Sean would almost certainly say 'can't edit existing audio, regenerate via the edit box, put $0'. This is inferred, not directly observed."}, {"concern_type": "edit_request", "sub_scenario": "change_voice_gender", "when": "Customer wants to change the singer's voice from male to female or vice versa", "then": "No response data available for the specific voice-swap request (unanswered). However, the closest responded scenario (change_genre_or_style) suggests Sean would first check if they saw all 4 versions, then direct them to the edit box to request new versions with the desired voice gender.", "confidence": "uncertain", "example_count": 2, "example_quotes": ["Why Is A Male Singing It? Shouldn't It Be A Female Singing It Bcuz It's [about a mother]", "Is there ANYWAY POSSIBLE that the Words to the Songs be kept the Same but change the Female Voices to Male Voices"], "example_responses": [], "notes": "Both instances were unanswered. The second case (cywebb09) was a follow-up from a persistent customer who had garbled audio issues and wanted to try male voices as a workaround. Based on Sean's patterns, he would likely explain that keeping exact same song with different voice is not possible, and suggest regeneration."}, {"concern_type": "product_issues", "sub_scenario": "song_unlocked_zero_duration", "when": "Customer reports their unlocked song shows 0:00 duration and has no audio, even though lyrics are present", "then": "No response data available (instances were unanswered). Based on the similar 'song_lost_no_audio_backup_failure' pattern, Sean would likely investigate, explain what happened, regenerate songs with the same parameters, and offer a refund plus free new versions.", "confidence": "uncertain", "example_count": 2, "example_quotes": ["I have the lyrics and the song says it's been unlocked but there is no sound. It's says 0.00.", "This is what's happening. Please resolve this [forwarded song link showing 0:00]"], "example_responses": [], "notes": "Both instances from the same customer (wardawg1955) who sent multiple follow-ups. All unanswered. This appears to be the same root cause as backup_failure but presenting differently (0:00 duration vs generic 'no sound')."}, {"concern_type": "product_issues", "sub_scenario": "ai_generation_not_matching_expectations", "when": "Customer is frustrated that generated songs don't match what they asked for, requiring many regenerations that use up their daily allotment", "then": "No response data available (instances were unanswered). These customers are frustrated with the AI quality itself rather than a specific bug.", "confidence": "uncertain", "example_count": 3, "example_quotes": ["Please let me finish my songs. I'm sorry for using up all my tries but I keep getting the wrong songs. The app tells me it understands what I want but [delivers something different]", "I got two songs that were damn near perfect so I asked the AI to change only two words but used up remaining generations", "I used up all my daily song tries and waited 24 hours and nothing happened"], "example_responses": [], "notes": "All 3 from the same customer. All unanswered. This is a distinct frustration pattern where the customer understands the system but feels the AI isn't delivering on its promises. The daily generation limit compounds the frustration. No responded examples exist, so Sean's approach to this scenario is unknown."}, {"concern_type": "edit_request", "sub_scenario": "change_nickname_in_song", "when": "Customer wants to change a specific nickname or term of endearment in the song (e.g., 'Grandpa' to 'Grandad', 'PawPaw')", "then": "No response data available (unanswered), but this falls under the standard 'change_specific_lyrics_or_details' pattern. Sean would direct them to the edit box to regenerate with the corrected nickname.", "confidence": "uncertain", "example_count": 2, "example_quotes": ["Would it be possible to change 'Grandpa' to 'Grandad'?", "The song you made is so perfect but how to I change his nickname to PawPaw?"], "example_responses": [], "notes": "Both unanswered. These are simple lyric word swaps that would follow the standard edit_request pattern. Likely response: can't edit existing, use edit box, regenerate, $0 if paid."}, {"concern_type": "download_issue", "sub_scenario": "how_to_download_mp3", "when": "Customer asks how to download their song as an MP3 file or just 'how to download'", "then": "Sean explains there's a download button on the song/listen page. He recommends downloading on a computer over a phone (phones make it confusing). If on phone, he mentions the email-to-self option (added later). If the customer seems stuck, he offers to email the MP3 as an attachment directly.", "confidence": "consistent", "example_count": 12, "example_quotes": ["How do i download this so i can add to my own picture?", "Is it possible to get this song or convert it to a mp3 file so we can access it from device without clicking on link to Serenade site?", "How do I download the song?", "How do i down load these songs?", "How do I save my Serenade song and pictures where it does not require the internet to play it?"], "example_responses": ["Easiest way is go to the page where you listen to your song, then look for the download button. If you're on your phone and it feels clunky, try downloading on a computer instead.", "You can download the MP3 file directly! On a computer, just click the 'Listen to Your Song' link from that email to go to your song, and there you'll see a download button.", "On the listen page, you'll see a download button... Just tap that download button and you should be set! If you are on phone, go with the option to email the song to yourself.", "For downloading, go to the listen page where you can play that song, you'll see a download button and a share button on either side of the red play button."], "notes": "Sean consistently recommends computer over phone for downloading. He later added an 'email the MP3' option accessible from the download button on mobile. He frequently offers to email the attachment directly if the customer seems stuck."}, {"concern_type": "download_issue", "sub_scenario": "download_button_not_working_phone", "when": "Customer says they clicked download but nothing happens, or they downloaded but can't find the file on their phone", "then": "Sean acknowledges phone downloads are 'weirdly tricky' and offers to either: (1) email the MP3 as an attachment directly, or (2) suggests the new email-to-self feature on the download button, or (3) recommends trying on a computer instead. He reassures the song is always safe online.", "confidence": "consistent", "example_count": 8, "example_quotes": ["How do I download this song? When I click on download nothing happens", "I can't make a payment and download songs", "Unable to download!!!", "I can not download the song what do I need to do?", "I am unable to download 2 recently purchased songs."], "example_responses": ["Since you're on your iPhone, phone downloads can be genuinely tricky. I just added though, if you tap download, you should be able to enter an email, and it will send the song there as an attachment.", "No worries at all, downloading on phones can be weirdly tricky sometimes. I went ahead and attached the song file directly to this email.", "Were you able to resolve this? Also I don't have this email in my system... when I do have the email, I can send them as an attachment to you.", "Downloading on a phone can be a little finicky... I've attached the song to this email to make it easier!"], "notes": "When user_found is false or email doesn't match records, Sean asks to verify the email. Sean always frames phone difficulty sympathetically, never blaming the user. His go-to solution evolved: early on he suggests computer, later he sends the MP3 attachment directly or points to the email-to-self feature."}, {"concern_type": "download_issue", "sub_scenario": "iphone_download_difficulty", "when": "Customer specifically mentions iPhone or mobile difficulty with downloading", "then": "Sean acknowledges iPhone downloads are tricky, recommends trying on a computer if available, and offers to email the MP3 directly as an attachment. He reassures the song is always safe online.", "confidence": "consistent", "example_count": 5, "example_quotes": ["How do I download this to my iPhone to keep for our anniversary?", "How do I save songs on my phone? I tried downloading from the page and I don't have it in my files", "can you tell me how to download the song so I can play it on my iPhone 17 in the car"], "example_responses": ["Ugh, downloading on a phone can be weirdly tricky. Your song is always safe and available online! If you have access to a computer, downloading from there is way more straightforward. If you only have your iPhone, I can just email the MP3 file directly to you.", "Phone downloads can be genuinely tricky. If you tap download, you should be able to enter an email, and it will send the song there as an attachment."], "notes": "Sean specifically says 'your song is always safe and available online' to reduce anxiety. He offers to email the MP3 as the simplest fallback for phone users."}, {"concern_type": "download_issue", "sub_scenario": "share_on_facebook", "when": "Customer wants to share/post their song on Facebook", "then": "Sean confirms they can share on Facebook. If the link preview looks generic (just shows Serenade.gifts), Sean acknowledges it looks wrong but says clicking it still goes to the specific song. If the share actually doesn't work, Sean investigates.", "confidence": "consistent", "example_count": 5, "example_quotes": ["Can this be posted on my face book page?", "Won't let me post it to facebook just puts the link to serenade", "When I try to post on Facebook, my song doesn't come up, just an advertisement for Serenade", "I can't share my song on Facebook"], "example_responses": ["Absolutely! Let me know if you run into any snags!", "I just gave it a shot and it looked like just a generic link to Serenade.gifts, but when I posted it and clicked it, it did take me to the specific song! So maybe it just looks wrong I'm hoping?", "You absolutely can! At least for Facebook it's very easy!"], "notes": "Facebook sharing has a known issue where the link preview shows a generic Serenade ad rather than the specific song. Sean acknowledges this but confirms the link works when clicked. Multiple unanswered instances suggest this is a recurring pain point."}, {"concern_type": "download_issue", "sub_scenario": "share_on_youtube_or_flash_drive", "when": "Customer asks about uploading song to YouTube or saving to a flash drive", "then": "Sean says yes, he can't think of anything stopping them, though he hasn't done it personally yet.", "confidence": "singleton", "example_count": 1, "example_quotes": ["Can I upload my song to my YouTube channel or save it to a flash drive?"], "example_responses": ["Yeah I can't think of anything that would stop that, though I can't say I've done either personally yet"], "notes": "Only one instance with a response. Sean is honest about not having tried it himself."}, {"concern_type": "download_issue", "sub_scenario": "wants_physical_cd", "when": "Customer asks about getting a CD of their song or if the song comes on a CD", "then": "Sean explains he doesn't offer physical CDs, but the customer can download the MP3 and burn it to a CD themselves. He recommends downloading on a computer for this. He mentions songs are always available online.", "confidence": "consistent", "example_count": 5, "example_quotes": ["How do I get the cd?", "do you put these on a cd or do we just have it on the mobile app?", "How can we hear this song outside of the phone, is there way to put it on a cd", "Is there any way to buy a CD or DVD for this?", "I really need this in CD I need to have for my sons wedding"], "example_responses": ["I don't offer physical CDs right now, but your song is always safe and available online! You can download it as an MP3 file and then burn it to a CD yourself.", "I don't offer physical CDs right now, but your songs are always safe and available online through the app. You can also download them as MP3 files anytime! If you want to put one on a CD, the easiest route is to download the MP3 on a computer and burn it to a disc.", "I don't offer a physical CD right now, but you could download it as an MP3 file and burn it to a CD.. I've never done that though (or at least not since I was 10)."], "notes": "Sean's tone is sympathetic and sometimes self-deprecating ('not since I was 10'). For the wedding mother-son dance case, Sean seemed more eager to help but response was truncated. He always explains the MP3 download \u2192 burn to CD workaround."}, {"concern_type": "download_issue", "sub_scenario": "wants_song_on_spotify", "when": "Customer asks about putting their song on Spotify or streaming services", "then": "No response pattern established - all instances went unanswered.", "confidence": "uncertain", "example_count": 3, "example_quotes": ["How can I put this song on my spotify playlist?", "Would love to have this song on Spotify", "How do I get the songs on Spotify and do I get any credit for it? Or are they just on there under your name?"], "example_responses": [], "notes": "All 3 Spotify-related questions went unanswered. This appears to be an area where Sean doesn't have a clear answer or offering yet. The question about royalties/credit is particularly interesting and unanswered."}, {"concern_type": "download_issue", "sub_scenario": "how_to_share_song_with_someone", "when": "Customer asks how to share/send their song to a specific person (via text, email, or generally)", "then": "Sean explains multiple sharing options available on the song page after unlocking: copy a share link (for texting), email the song to someone, or use the share button. He often includes ne clicks it.. it's not opening on their side? I'm curious what happens when they do tap it?"], "notes": "Sean investigates rather than giving a canned answer. Only one instance with a response."}, {"concern_type": "download_issue", "sub_scenario": "video_download_stuck", "when": "Customer reports the video/slideshow download gets stuck (often at 95%) or won't complete", "then": "No consistent response pattern - some were investigated and a fix was attempted, but follow-ups show the fix didn't always work. Multiple instances went unanswered.", "confidence": "uncertain", "example_count": 3, "example_quotes": ["im trying to download the video but its been stuck at 95%", "Sorry to say it's still not downloading to my iphone.. i tried multiple times..", "i had an issue with downloading and saving the song.. you responded that it was already fixed but i still wasn't able to save it"], "example_responses": [], "notes": "This appears to be a known technical issue that Sean tried to fix but didn't fully resolve. The video/slideshow download is more problematic than the MP3 download. Multiple follow-ups went unanswered, suggesting this remains an open issue."}, {"concern_type": "download_issue", "sub_scenario": "share_reaction_video_too_large", "when": "Customer wants to share a reaction video but the file is too large to send via email", "then": "Sean is excited about seeing the reaction video, increases the maximum video size limit, suggests trying again, and offers Google Drive as an alternative for sharing.", "confidence": "singleton", "example_count": 1, "example_quotes": ["I tried to send the video but it was too big, how can I share with you?"], "example_responses": ["That's so awesome you captured a reaction video \u2014 I'd love to see it! I just tried making the maximum video size there larger. Want to try it again? Alternatively, if you upload it to Google Drive, you could share the link with me."], "notes": "Sean is very enthusiastic about reaction videos and eager to receive them. He proactively fixes the size limit."}, {"concern_type": "download_issue", "sub_scenario": "paid_but_screen_closed_before_download", "when": "Customer paid for the song but the screen closed/jumped before they could download, and now they can't access it", "then": "Sean sends a magic login link to the customer's My Songs page so they can access the song they paid for. If the email doesn't match system records, he asks to verify. He may also attach the MP3 directly.", "confidence": "consistent", "example_count": 4, "example_quotes": ["I paid for Janie's prayer still holds us and it closed the screen before I could share or download", "When I wanted to download it, the screen jumped off and I have nothing", "I had a song made and purchased it, it came out of my account but didn't give me the option to download and save", "Please help, I created a song for my husband and paid thru PayPal but it wouldn't let me download the song"], "example_responses": ["If you tap this link [magic link], it will bring you back to your songs!", "I can send it to you as an attachment. I don't see this email you are using in the system so I'm not able to identify the songs to send!... could this be you? [alternative email]?", "Apologies, especially for something so sweet. [sends magic link]"], "notes": "Sean's priority is getting the customer back to their song ASAP. He uses magic login links. When the email doesn't match, he tries to find the right account. He's extra sensitive when the song has emotional significance (memorial, anniversary)."}, {"concern_type": "download_issue", "sub_scenario": "song_never_downloaded_multiple_attempts", "when": "Customer says the song never downloaded after payment, leading them to create many duplicate songs", "then": "Sean empathizes about phone download behavior, explains phones download silently and hide files. He attaches the MP3 directly to the email to bypass the download issue.", "confidence": "singleton", "example_count": 1, "example_quotes": ["I tried this out a few weeks ago and did send u $25\u2026and payment processed. For some reason, the song never downloaded and that's why it looks like so many songs."], "example_responses": ["I know the downloading can be a little finicky, phones have a weird way of downloading, but not telling you it worked, and they tuck it in some random corner of the phone that's hard to find. I've attached the song to this email to make it easier!"], "notes": "Sean acknowledges the confusing phone download behavior and immediately solves it by attaching the file."}, {"concern_type": "download_issue", "sub_scenario": "elderly_or_not_tech_savvy_customer", "when": "Customer explicitly mentions being a senior, not good with technology, or shows signs of tech difficulty", "then": "Sean is patient and empathetic, provides the simplest possible solution (usually attaching the MP3 directly to the email and/or sending a magic login link). He offers step-by-step guidance and says 'let me know if you get stuck'. He may send the song as attachment plus a login link to their My Songs page.", "confidence": "consistent", "example_count": 4, "example_quotes": ["I'm a senior and not too savvy with this phone! How can I save this to send to my daughter?", "I'm sorry I'm 67. I'm not good with Computers.", "I'm having trouble downloading this one too. Can you help?"], "example_responses": ["No problem at all! [provides help]", "I attached it to this email. But probably the easiest would be clicking the below link, which will take you to your 'My songs' page.", "No problem, and sorry I'm just getting to this now! Hope this is the right song [sends attachment]"], "notes": "Sean never condescends. He pre-emptively simplifies by sending attachments rather than instructions. For repeat customers (like Shirley with 80 songs), he has an ongoing supportive relationship."}, {"concern_type": "download_issue", "sub_scenario": "slideshow_pictures_issue", "when": "Customer is trying to download more pictures for slideshow or having issues with slideshow photos", "then": "Sean mentions the 20 picture maximum on the slideshow and offers to increase it. He apologizes for the delay.", "confidence": "singleton", "example_count": 1, "example_quotes": ["I'm trying to download more pics and it's not letting me"], "example_responses": ["I know there's a 20 picture maximum on the slideshow if that's what you are referring to. Maybe I can bump that up.. Actually I will right now!"], "notes": "Sean proactively increases the limit rather than just explaining it."}, {"concern_type": "download_issue", "sub_scenario": "email_not_in_system", "when": "Customer reports download issue but their email is not found in the system (user_found: false)", "then": "Sean lets them know the email isn't in the system and asks if they might have used a different email. If he can guess the alternative email, he suggests it. He explains that when he has the right email, he can send the songs as an attachment.", "confidence": "consistent", "example_count": 3, "example_quotes": ["Please help, I created a song for my husband and paid thru PayPal but it wouldn't let me download the song", "How can I save this? Please let me know?", "How do I download this song? When I click on download nothing happens"], "example_responses": ["I can send it to you as an attachment. I don't see this email you are using in the system... could this be you? powellsquaw2?", "I'm not actually seeing this email in our system. If you unlocked the songs, they get saved, but even not unlocked ones stay around for a month!", "I don't have this email in my system associated with any unlocks. Was this the email you unlocked with?"], "notes": "Sean always tries to help identify the right account. He may look up similar emails in the database."}, {"concern_type": "general_faq", "sub_scenario": "pricing_how_much", "when": "Customer asks how much a song costs or what the pricing is", "then": "Sean explains it's pay-what-you-want (including $0). He frames it as a tip system \u2014 everything is free, and if they want to leave a tip it's appreciated but no pressure. He often says 'I didn't make this for the money' or compares to a free service with optional tipping.", "confidence": "consistent", "example_count": 10, "example_quotes": ["How much does this cost for one song?", "How much is the song", "How much will this cost", "How much is it for the song that u did for me, I absolutely love it", "How much is this please?", "What is the fee for receiving this?"], "example_responses": ["Serenade is actually pay-what-you-want, so you can pay whatever feels right to you, including $0. No hidden costs.", "Whatever you want! You decide the price and you can put zero dollars and you'll still get everything! I didn't make this for the money :)", "It's totally up to you how much you want to pay for it, and there's no pressure around that. Plenty of people put $0 and I'm grateful. You can set the price when you unlock it, even $0 works!", "The pricing is totally pay-what-you-want. No hidden fees. Totally up to you, and you get to hear the full songs, can edit them, everything, and then decide what to pay. Think of it as a free service, and if you want to leave me a tip to help cover costs, its certainly appreciated!"], "notes": "Extremely consistent response pattern. Sean ALWAYS frames it as pay-what-you-want, explicitly says $0 is fine, and uses 'tip' language. He never states a specific price or suggests a recommended amount. He emphasizes no pressure."}, {"concern_type": "general_faq", "sub_scenario": "legitimacy_scam_concerns", "when": "Customer expresses concern about whether the service is legitimate, a scam, or worries about entering card info", "then": "Sean explains the pay-what-you-want model means they can put $0 and never enter card info. He frames this as proof it's not a scam. He encourages trying the service risk-free and paying later only if they love it.", "confidence": "consistent", "example_count": 2, "example_quotes": ["How do I know this isn't a scam website I fear putting my card info in", "Are you an LLC, 5013c or some other type of business? I attempted a web search and nothing shows up."], "example_responses": ["What I built here is pay-what-you-want. So feel free to go through the process, and when it asks about payment, just put $0 and you'll get everything without needing to put in any card info.", "In terms of company structure: I'm just a dude [casual explanation]"], "notes": "Sean uses the $0 option as the ultimate trust-builder. For company legitimacy questions, he's honest and casual about being an individual rather than a corporation."}, {"concern_type": "general_faq", "sub_scenario": "preview_before_paying", "when": "Customer asks if they can hear/preview/listen to the song before paying", "then": "Sean confirms they can listen to the full song before paying anything. He explains the play button and frames the payment as a 'tip' that happens after they've experienced everything.", "confidence": "consistent", "example_count": 4, "example_quotes": ["Can I hear the song before I pay?", "I need to hear the song it want me to pay first", "I was wondering if I can listen to all the songs before I make my decision and donation?", "Why can't I listen to the song before I tip!"], "example_responses": ["Yes totally! You can listen to your song, edit it, do everything before paying anything. It's also more of a 'tip' system.", "You can hear the songs first! Just hit the lil red play button on them :)", "Yes absolutely! Basically the service is free, nothing is held back, then you can decide to 'tip' down the line :)"], "notes": "This comes up frequently and Sean always clarifies that EVERYTHING is available before payment. If a customer thinks they can't preview, it's likely a UI confusion rather than an actual restriction."}, {"concern_type": "general_faq", "sub_scenario": "is_payment_required", "when": "Customer asks if they have to donate/pay to continue using the service, or seems confused about payment being required", "then": "Sean confirms payment is whatever they want to give back (including $0). He says it's entirely optional with no pressure.", "confidence": "consistent", "example_count": 3, "example_quotes": ["Do I have to donate money to continue?", "You said it was free. Is there a way to pay for them all at once?", "Suppose to be free the first Time and they ask me to put Money with my credit card"], "example_responses": ["Seems like you got it figured out. Hope you're enjoying Serenade :)", "Yes it is however much you want to give back! (including 0)", "In the payment amount, just put $0, and it's free! No payment info required :)"], "notes": "Sean always reassures that $0 is fine. For the French-speaking customer, he still responded in English but kept it very simple."}, {"concern_type": "general_faq", "sub_scenario": "songs_for_other_family_members", "when": "Customer asks if they can create songs for other family members (not just spouses)", "then": "Sean enthusiastically confirms yes, mentions that was the original use case, and that the spouse thing 'kinda took off'.", "confidence": "singleton", "example_count": 1, "example_quotes": ["Can you do this for other family members like my grown kids"], "example_responses": ["Absolutely! Honestly that was what I originally made this for! Then the spouse thing kinda took off."], "notes": "Sean is enthusiastic and shares a fun backstory about the product's evolution."}, {"concern_type": "general_faq", "sub_scenario": "can_create_another_song", "when": "Customer asks if they can make another song", "then": "Sean confirms enthusiastically that they can make as many as they'd like.", "confidence": "consistent", "example_count": 2, "example_quotes": ["Can I do another one", "Thank you brother... when I get paid I'll have you write a song about our new friendship"], "example_responses": ["Ya man, make as many as you'd like! Let me know s can be created in Spanish or other languages", "then": "Sean confirms yes, advises mentioning the language in the song details and filling out the form in that language. He suggests choosing an appropriate genre style (ranchera, norte\u00f1o, cumbia, etc.).", "confidence": "singleton", "example_count": 1, "example_quotes": ["Do y'all do songs in Spanish? Mexican music?"], "example_responses": ["Oh heck ya, you can totally do songs in Spanish! When creating your song, just mention in the details that you want it in Spanish, and ideally fill out the questions in Spanish. When choosing style, you can even input a Mexican music style like ranchera, norte\u00f1o, cumbia, whatever vibe you're going for."], "notes": "Sean gives practical guidance on how to get the best result in another language."}, {"concern_type": "general_faq", "sub_scenario": "how_to_unlock_song", "when": "Customer asks how to unlock or purchase a song", "then": "Sean explains the unlock process and sends a magic login link to their My Songs page. If the customer already unlocked (visible in data), Sean acknowledges they figured it out.", "confidence": "consistent", "example_count": 3, "example_quotes": ["How do I unlock a song", "Can you purchase the songs", "How do I go back to purchase it"], "example_responses": ["Looks like you figured it out! Thanks for using Serenade :)", "Yep! Purchasing the songs lets you keep them, share them, download etc. If you head to your songs page, you'll see the option to unlock them. [includes magic login link]"], "notes": "Sean always provides a magic login link for convenience, even if the customer might find it on their own."}, {"concern_type": "general_faq", "sub_scenario": "compare_song_versions", "when": "Customer asks how to listen to or compare multiple versions of their song", "then": "Sean explains they can listen to both/all versions in full before choosing, with play buttons for each version.", "confidence": "singleton", "example_count": 1, "example_quotes": ["The program created two versions of the song. How do I know which one I like best, if I can't hear a little bit of each."], "example_responses": ["You should actually be able to listen to both versions in full before you pick your favorite. Once you're on the song page, you'll see a play button for each version and you can listen all the way through to compare."], "notes": "Sean confirms full listening is available for all versions."}, {"concern_type": "general_faq", "sub_scenario": "do_songs_expire", "when": "Customer asks if their songs expire or how long they remain available", "then": "Sean explains that unlocked songs stay forever, but non-unlocked songs expire after about a month (to manage storage costs).", "confidence": "consistent", "example_count": 2, "example_quotes": ["Do the songs on Serenade expire?", "How long are these songs available for me to select the ones I want"], "example_responses": ["Songs that aren't unlocked expire after a month, just so I'm not paying too much for storage! Unlocked songs stay forever though.", "The songs won't disappear, so no rush at all :)"], "notes": "For the second instance, Sean told the customer the songs won't disappear (she had 56 songs, 0 unlocked), which is slightly inconsistent with the 30-day expiration policy. He may have been reassuring since her deadline was still within the window."}, {"concern_type": "general_faq", "sub_scenario": "referral_program", "when": "Customer asks about a referral program/code, or mentions seeing a referral feature", "then": "Sean explains the referral system is in an early/experimental state. He mentions tracking who brings in whom and plans to add referral benefits in the future. He doesn't have formal referral codes yet.", "confidence": "consistent", "example_count": 2, "example_quotes": ["I saw a statement that you paid referrals and could create a link to share but it did not allow me", "Do I still have a referral code to share with friend"], "example_responses": ["The referrals were also just visible to a small group. I do track who brought who in! When I do add the referral benefits, you will get them for each person you brought in!", "I don't technically have a referral code system right now, but I plan on adding referral benefits, and I do track who brought who in!"], "notes": "The Love Fund / referral system appears to be in early stages. Sean is transparent about it being incomplete but shows it's being tracked."}, {"concern_type": "general_faq", "sub_scenario": "about_the_company", "when": "Customer asks about the company structure, legitimacy, or who's behind Serenade", "then": "Sean is transparent and casual \u2014 explains he's 'just a dude' making this. He doesn't try to sound corporate.", "confidence": "singleton", "example_count": 1, "example_quotes": ["Are you an LLC, 5013c or some other type of business? I attempted a web search and nothing shows up."], "example_responses": ["In terms of company structure: I'm just a dude [casual explanation]"], "notes": "Sean is refreshingly honest about the informal nature of the business."}, {"concern_type": "general_faq", "sub_scenario": "confused_about_next_steps", "when": "Customer seems confused about what to do next, asks 'now what?', or doesn't understand the flow after receiving a magic link or welcome email", "then": "Sean explains the next steps based on where the customer is in the flow. If they have songs, he points them to listen/unlock. He sends a magic login link and offers to walk through step by step.", "confidence": "consistent", "example_count": 4, "example_quotes": ["Hello now what do I do now?", "What i gotta do", "So what do I do to get this song", "How do I get my song I just made"], "example_responses": ["I see you've got 44 songs created! If there's any you want to keep, just tap the unlock button. [includes magic login link]", "Sorry, can you help me understand what you're getting stuck with?", "Maybe you heard them, and wanted to keep! Just hit the 'Unlock' button next to the songs you want to keep! Otherwise they will disappear after 30 days.", "Here's a link to your song :) [magic link] (just tap the above)"], "notes": "When the customer's intent is unclear, Sean sometimes asks for clarification. When it's clear they're trying to access songs, he sends a magic login link."}, {"concern_type": "general_faq", "sub_scenario": "slideshow_after_purchase", "when": "Customer asks about adding a slideshow/photos to their song, or how to use the slideshow feature", "then": "Sean confirms slideshows can be added before or after purchase. He's transparent about the lyric sync issue on some songs and mentions the feature is in a 'tricky spot'.", "confidence": "consistent", "example_count": 2, "example_quotes": ["Can I add a slideshow after purchase?", "How do I get pictures on my photo app to drop into the slideshow?"], "example_responses": ["Yep you can create the slideshows before or after purchase! The feature though I admit is in kindof a tricky spot.. if you look at the lyric video, you might notice the lyrics not synced properly to the music."], "notes": "Sean is honest about slideshow quality issues. One slideshow question went unanswered."}, {"concern_type": "general_faq", "sub_scenario": "credit_card_security_concerns", "when": "Customer expresses concern about credit card security or doesn't want to enter card information", "then": "Sean empathizes with the concern, explains the $0 option means no card info needed, and mentions PayPal as an alternative. For customers who are particularly worried, he may offer the song for free.", "confidence": "consistent", "example_count": 2, "example_quotes": ["I am not a fan of the open ended pricing... I also fear putting my credit card info", "I don't have credit cards or pay pal"], "example_responses": ["I hear you really like the song, and I would love for you to have this song for free! By putting 0 in the price, you get to complete the unlock process without entering card info.", "Go ahead and put $0, that will let you skip all the payment shenanigans. This one's on the house!"], "notes": "Sean uses the $0 option as the trust-builder. For customers who literally can't pay, he proactively offers the song for free."}, {"concern_type": "general_faq", "sub_scenario": "access_all_songs", "when": "Customer asks if they can get all their songs or how to access them all", "then": "Sean sends a magic login link to the My Songs page where they can access, listen, unlock, and download all their songs.", "confidence": "consistent", "example_count": 2, "example_quotes": ["Can I get them all", "how much it would to unlock songs for a yr"], "example_responses": ["Yes you can! Here's a link to your My Songs page where you can access all of them. From there you can listen, unlock, and download whichever ones you want.", "When you unlock a song, you get it forever! And I recently switched the price from $24, to a pay-what-you-want model."], "notes": "Sean always includes a convenience magic link. He clarifies that unlocked songs are permanent."}, {"concern_type": "general_faq", "sub_scenario": "how_long_does_it_take", "when": "Customer asks how soon they'll receive their song after paying or creating", "then": "Sean explains the songs are created immediately through the regular flow. Payment is pay-what-you-want. He provides a link to get started.", "confidence": "singleton", "example_count": 1, "example_quotes": ["How soon after I pay, will I be receiving my song? If I need any changes on the song, please let me know what I need to do."], "example_responses": ["The pricing is totally pay-what-you-want. No hidden fees. Totally up to you, and you get to hear the full songs, can edit them, everything, and then decide what to pay. Here's the link to get started."], "notes": "Sean redirects from the timing concern to explaining the flow \u2014 songs are generated almost immediately."}, {"concern_type": "general_faq", "sub_scenario": "step_by_step_sharing_instructions", "when": "Customer asks for step-by-step instructions on how to share or send a song", "then": "Sean provides a direct share link to the specific song AND/OR attaches the MP3 to the email, and explains the customer can forward it. He keeps instructions simple and provides a magic login link.", "confidence": "consistent", "example_count": 3, "example_quotes": ["I can't send second song!!! Step by step how????", "How do I share this song with my daughter?", "How do I send it to his messages"], "example_responses": ["Here's a link you can share with anyone you want to hear the song: [direct URL]. Or, I've downloaded the song and attached it to this email. You can forward this email to anyone who you want to hear it!", "Once the song is unlocked, sharing is super easy! There's several options on the page, such as having it emailed to them, or copying a link that you can text them!"], "notes": "For frustrated or less tech-savvy customers, Sean takes the simplest approach: sends the link and/or attaches the file directly."}, {"concern_type": "general_faq", "sub_scenario": "delayed_response_pattern", "when": "Sean's response comes significantly after the customer's message", "then": "Sean always opens with an apology for the delay, then addresses the issue. If time has passed, he asks 'Did you get this sorted?' to check if it's still relevant.", "confidence": "consistent", "example_count": 8, "example_quotes": [], "example_responses": ["Apologies for the delay here! Did you get it all sorted?", "Major apologies for the delay here!", "Apologies, this email slipped through the cracks!", "Sorry I'm just getting to this now!"], "notes": "This is a cross-cutting pattern. Sean consistently apologizes for delays and checks if the issue is still relevant. He never ignores the delay or acts like it didn't happen."}, {"concern_type": "general_faq", "sub_scenario": "cant_sign_in_login_issues", "when": "Customer can't sign in or login to access their songs (sometimes tagged as general_faq when it's about understanding the process)", "then": "Sean immediately sends a magic login link that takes them directly to their My Songs page.", "confidence": "consistent", "example_count": 3, "example_quotes": ["Not letting me sign in", "Can't log in to hear my song", "Want let me sign in"], "example_responses": ["Tap here [magic login link] and you should be brought back to your songs! :)", "Jumping on this right now I'll be right back with you!"], "notes": "Magic login links are Sean's go-to for access issues. He generates them from the backend and sends them directly."}, {"concern_type": "expression_of_gratitude", "sub_scenario": "pure_thank_you_brief", "when": "Customer sends a short thank you message (1-2 sentences) after receiving/unlocking their song, with no additional questions or requests", "then": "Respond briefly (2-4 sentences). Acknowledge the thanks warmly, express hope the recipient loves it, sign off with 'Warm wishes, Sean' or 'Thanks for using Serenade'. Keep it short since the customer's message was short.", "confidence": "consistent", "example_count": 12, "example_quotes": ["Thank u so much", "Thank you.", "Thank you so much"], "example_responses": ["Hey Diana! Of course! Hope William loves it. Thanks for using Serenade. Warm wishes, Sean", "Hey Kim! You're so welcome. Hope it's a hit when they hear it! Thanks for using Serenade. Warm wishes, Sean", "Hey Cheri! My absolute pleasure :D Thanks for giving Serenade a shot. Warm wishes, Sean"], "notes": "Sean matches the customer's energy level. Short messages get short responses. He always uses the customer's first name."}, {"concern_type": "expression_of_gratitude", "sub_scenario": "emotional_impact_story", "when": "Customer shares that the recipient cried, was deeply moved, or had a strong emotional reaction to the song", "then": "Respond with genuine warmth and personal touch (3-6 sentences). Express that their sharing made HIS day. Use phrases like 'that's what it's all about', 'this just made MY day', 'love to hear it'. Sign off warmly. Do NOT try to upsell or redirect.", "confidence": "consistent", "example_count": 18, "example_quotes": ["when I played it for him this morning he cried! He said he is going to listen to it every day while driving to work!", "My wife and I both loved the song... we both cried after", "She cried alot she's in Montana and I'm in NC ty for making her day", "He cried thank you for this it is his Birthday coming up", "I could not get through the first 30 seconds without crying"], "example_responses": ["Oh man, this just made MY day. got me a lil teary eyed hehe.", "Heck ya, that's what it's all about! Thanks for using Serenade", "Absolutely love to hear it. Feel free to come back anytime for more songs.", "Oh that is so sweet. I appreciate you sharing that with me", "Oh man, this was so sweet to receive Barb, thank you so much for sharing that!"], "notes": "Sean gets genuinely emotional when people share crying/emotional stories. He often says it made his own day. When the story involves deep hardship (cancer, loss, distance), he responds with more gravity and empathy."}, {"concern_type": "expression_of_gratitude", "sub_scenario": "emotional_impact_with_hardship", "when": "Customer shares deep personal hardship context along with gratitude (fighting cancer, lost a loved one, disability, financial struggle, relationship difficulties, terminally ill)", "then": "Respond with empathy and dignity (3-5 sentences). Acknowledge the hardship specifically. Wish them strength/peace. Do NOT offer free songs unless they bring up money. Use phrases like 'Wishing you strength in your fight' or 'rooting for you'. Sign off with 'Wishing peace your way' or 'God Bless'.", "confidence": "consistent", "example_count": 6, "example_quotes": ["Thank you so much... I'm fighting cancer this made cry it's great", "Thank you from the bottom of my heart, we are at a rough spot but working together to resolve the problem", "I want to thank you for giving me a platform in words behind music for all the trauma in my life has haunted me", "I don't think I'm going to make it to the end of the month before I pass away"], "example_responses": ["Wishing you strength in your fight, and that many unexpected moments light you up in the coming days.", "This really means a lot to hear, thank you for sharing that with me. Rooting for you!!", "Thank you so much for sharing that with me. Knowing that Serenade has given you a way to put words and music to those experiences means a ton", "Wow, never gotten an email quite like this before... I'm really honored what I've made here is helping you express your love"], "notes": "Sean shifts to a more reverent, less casual tone for serious hardship. He matches the emotional gravity. He does not try to be funny or casual when someone mentions terminal illness or deep trauma."}, {"concern_type": "expression_of_gratitude", "sub_scenario": "gratitude_plus_follow_up_question", "when": "Customer expresses gratitude AND asks an unrelated follow-up question (how to download, get lyrics, share, edit song, etc.)", "then": "Briefly acknowledge the gratitude (1-2 sentences), then pivot to answering their question in detail. Provide direct links to their songs page when relevant. The question takes priority over the gratitude.", "confidence": "consistent", "example_count": 14, "example_quotes": ["I love and bought the song. All four versions. But I would love to hear 4 different versions in country", "I absolutely love this song.. I did realize after I bought it, I had made a tiny mistake.. At the beginning of the song, I put the date 1968, but it was supposed to be 1966", "I love this by the way! Such a unique and thoughtful gift! Do you put these on a cd?", "I loved the song I been playing it since I got it. But I just realized that I did not include her husband in the Song."], "example_responses": ["So stoked you love the songs :) And yes you certainly can, I just built something just for this! [then detailed instructions]", "So glad you love the song! So unfortunately I can't edit the audio directly, but the good news is you can totally generate a new version... [then detailed instructions]", "So glad you love it! I don't offer physical CDs right now, but... [then alternatives]", "So glad you're loving the song! So I can't edit the existing audio, but... [then detailed instructions for regenerating]"], "notes": "Sean always acknowledges the gratitude first but keeps it brief, then gives a thorough answer to their actual question. He often includes links to their My Songs page."}, {"concern_type": "expression_of_gratitude", "sub_scenario": "gratitude_plus_wanting_to_pay_more_or_tip", "when": "Customer expresses gratitude AND says they want to tip, pay more, or donate additional money", "then": "Thank them warmly for the thought. Tell them there is no pressure around payment. If they insist, explain they can unlock another song as a way to pay. Do NOT provide external payment links (no CashApp, no Venmo, no mailing address). Deflect payment pressure graciously.", "confidence": "consistent", "example_count": 5, "example_quotes": ["I absolutely love the song. Will be sending a tip this afternoon.", "I put $0 at the end because I didn't know what it would be, but now I really want to pay for it. How do I do that?", "when I get paid I'll have you write a song about our new friendship and I will tip you very well"], "example_responses": ["And no pressure around the tip at all! Knowing it made you happy is plenty!", "You're so kind to want to! You're under no obligation, but if it would feel right to, you can head back and unlock another song.", "Can't wait to hear that song :P And ya man, make as many as you'd like!"], "notes": "Sean consistently deflects payment pressure. He never shares CashApp, Venmo, or mailing address. The one exception was Jim (jvforan) who asked for a mailing address to send a $200 check - Sean gave a PO Box. But the default is to deflect."}, {"concern_type": "expression_of_gratitude", "sub_scenario": "gratitude_plus_referrals_sharing", "when": "Customer says they will tell friends/family about Serenade, asks about referral codes, or mentions sharing on social media", "then": "Express genuine excitement and gratitude for word-of-mouth sharing. Say spreading the word means a lot. If they ask about referral codes, explain the referral system is not fully set up yet but tracking exists. Mention that word-of-mouth is the best support.", "confidence": "consistent", "example_count": 7, "example_quotes": ["I will tell all my friends and families to do the same", "I will make sure I tell everyone about you Sean", "Do I still have a referral code to share with friend?", "I put your link and info on Facebook so they can hear the song"], "example_responses": ["Really appreciate you saying that! Come back for more anytime :)", "You spreading the word means so much to me. That's the best kind of support there is!", "That's so cool that people are wanting to try it out after hearing yours. I don't technically have a referral code system right now, but I plan on adding some referral benefits", "Truthfully your words mean so much more to me than $23 ever could"], "notes": "Sean is genuinely excited about word-of-mouth referrals. He treats them as more valuable than payment."}, {"concern_type": "expression_of_gratitude", "sub_scenario": "gratitude_with_generous_donor", "when": "Customer has paid a generous amount AND expresses gratitude (visible from their donation amount or context clues about payment size)", "then": "Express deep gratitude. Acknowledge that their financial support keeps Serenade going. Use phrases like 'I lose money on the vast majority of people who come to the site, but it's the occasional person like you that keeps it floating'. Offer to be at their service for future needs.", "confidence": "consistent", "example_count": 2, "example_quotes": ["Thank you so much, my wife loved i n't get paid April 1 I'm a disabled veteran", "I don't have any $ til next week but love the finished song"], "example_responses": ["Please don't stress about the money at all. Feel free to put $0 in the payment amount and unlock them right now! No need to wait. There is zero expectation, I promise.", "Don't even worry about that! You can absolutely put $0 in the payment amount, no stress at all.", "[Thanked for service, attached song to email, provided link to My Songs page]", "You can just put $0 :)"], "notes": "Sean ALWAYS tells them to put $0 immediately. He never says 'pay me when you can' or suggests they come back to pay later. He explicitly removes any payment obligation."}, {"concern_type": "money_hesitancy", "sub_scenario": "on_disability_or_fixed_income", "when": "Customer mentions being disabled, on disability, on a fixed income, or very low income as the reason they cannot pay", "then": "Respond with compassion and zero pressure. Tell them not to worry about it for a second. If song is not yet unlocked, tell them to put $0. If already unlocked at $0, reassure them that is exactly what Serenade is for. Use phrases like 'You are using Serenade for exactly the reason I made it.. to send someone love!' Frame their use as a gift to Sean, not charity from Sean to them.", "confidence": "consistent", "example_count": 7, "example_quotes": ["The song is beautiful, but I'm on disability. Sorry to have wasted your time.", "sorry I didn't have a way to send you money for what you did. I'm disabled", "I'm 66 and on a very low fixed income and only get 424 dollars a month. I would love to tip you but I can't", "I am on a fixed income and I really don't have the money to leave right now", "I am very low income but still would like to tip something"], "example_responses": ["When you go to unlock your song, you get to put in whatever price you want (including $0)!", "Please don't even worry about that for a second. You are using Serenade for exactly the reason I made it. end someone love!'"}, {"concern_type": "money_hesitancy", "sub_scenario": "thinks_service_costs_money_and_cant_afford", "when": "Customer explicitly says they cannot afford the service, or asks if they can still get a song even though they cannot pay", "then": "Reassure them: absolutely 100% yes, they never need to pay. Tell them to put $0. Provide link to their songs page. Use phrases like 'You never need to pay a thing' and 'just put $0 in the payment amount'.", "confidence": "consistent", "example_count": 3, "example_quotes": ["I can't afford anything at this time but I would love this song for my daughter", "What if you are on a fixed very very tight income and can't pay would you still do a song for a person?", "I don't have any way of donating at this time. Please let me send this serenade to my love"], "example_responses": ["Please don't worry about that at all! When you get to the payment step, just put $0 and you're all set.", "Absolutely, 100% yes. You never need to pay a thing. Just put $0 in the payment amount and you're all good", "Fear not - just put $0 in the payment amount and send that serenade to your love! There's zero expectation to donate"], "notes": "Sean is emphatic and clear. He never hedges or says 'well, we'd appreciate even a small amount'. It is always an unqualified 'put $0'."}, {"concern_type": "money_hesitancy", "sub_scenario": "confused_by_payment_screen_thinks_required", "when": "Customer is confused by the payment/unlock screen and thinks payment is required when it is not (thinks tip is mandatory, cannot get past the payment screen, sees credit card form and assumes they must pay)", "then": "Clarify that $0 is a valid amount. Keep the response brief and direct. If the payment screen is literally blocking them, tell them to enter $0 in the amount field.", "confidence": "consistent", "example_count": 3, "example_quotes": ["You said it was free. Is there a way to pay for them all at once?", "it won't let me past the part where you can ransparent about what went wrong. In cases of actual data loss, Sean is deeply apologetic and proactively processes refunds without being asked.", "confidence": "consistent", "example_count": 3, "example_quotes": ["I paid for 5 songs but can only play 2, the other 3 won't play... is this a scam?", "I still am not able to listen to the song... I did get your email that it can be tricky sometimes", "[garbled audio on paid song]"], "example_responses": ["Definitely not a scam or cash grab, I promise. [Discovered 45 songs lost in incident] I will go and refund you these songs right away... I encourage you, if you make any other songs, to put $0!", "Got it all fixed, and should work now. Here's a link to your songs.", "I can't see if you've paid, but if you have, by all means I'll happily refund you."], "notes": "Sean DOES process refunds when warranted. He is proactive about it when songs are truly lost/broken. He offers refunds even when the customer hasn't explicitly asked. He combines refund with encouraging future free use."}, {"concern_type": "payment_issues", "sub_scenario": "expected_free_but_sees_payment_screen", "when": "Customer thought the service was free but encountered a payment screen and is confused or frustrated", "then": "Clarify that they can put $0 and it IS free. Be brief and direct. Do not over-explain the pay-what-you-want model unless they ask.", "confidence": "consistent", "example_count": 3, "example_quotes": ["Suppose to be free the first Time and they ask me to put Money with my credit card", "You said it was free. Is there a way to pay for them all at once?", "The song is beautiful, but I'm on disability. Sorry to have wasted your time. I thought it was free."], "example_responses": ["In the payment amount, just put $0, and it's free! No payment info required :)", "Yes it is however much you want to give back! (including 0)", "When you go to unlock your song, you get to put in whatever price you want (including $0)!"], "notes": "These are quick, factual corrections. Sean does not make them feel bad for misunderstanding."}, {"concern_type": "payment_issues", "sub_scenario": "paid_for_wrong_version", "when": "Customer unlocked/paid for the wrong version of their song and wants the correct one instead", "then": "Reassure them it is no problem. Direct them to the version they want and tell them to unlock it for $0 since they already paid for another. Provide link to their songs page.", "confidence": "singleton", "example_count": 1, "example_quotes": ["I tried to choose V2 with the lady singing. I made a donation. But the wrong song was chosen and it is a man singing."], "example_responses": ["No problem at all! Just head on over to the version you do want [and unlock for $0]"], "notes": "Only one instance observed. Sean treats it as an easy fix and does not make a big deal of it."}, {"concern_type": "payment_issues", "sub_scenario": "wants_to_batch_pay_for_multiple_songs", "when": "Customer wants to pay for multiple songs at once in a single transaction", "then": "Explain that songs need to be unlocked one at a time. Tell them no pressure around the price. Provide link to their songs page.", "confidence": "consistent", "example_count": 2, "example_quotes": ["I did a few songs can I unlock them and pay for them all at once", "Is there a way to pay for them all at once?"], "example_responses": ["They would need to be unlocked one at a time, but you are welcome to unlock as many as you'd like and feel no pressure around the price part of it!", "No sorry, you'll have to do one at a time, but hopefully that doesn't take more than a minute or two!"], "notes": "Sean is honest that batch payment is not available but keeps it light."}, {"concern_type": "payment_issues", "sub_scenario": "paypal_specific_issues", "when": "Customer's PayPal payment specifically failed, or they ask if PayPal is accepted as a payment method", "then": "If asking about availability: confirm PayPal is accepted. If PayPal failed: suggest tr const LABELS = {"cant_access_song": "Can't Access Song", "general_faq": "General FAQ", "feature_request": "Feature Request", "other": "Other", "download_issue": "Download Issue", "product_issues": "Product Issues", "edit_request": "Edit Request", "payment_issues": "Payment Issues", "expression_of_gratitude": "Expression of Gratitude", "money_hesitancy": "Money Hesitancy", "payment_cant_pay": "Can't Pay", "general_question": "General Question"};
const COLORS = {"cant_access_song": "#4f46e5", "general_faq": "#0891b2", "feature_request": "#7c3aed", "other": "#6b7280", "download_issue": "#2563eb", "product_issues": "#dc2626", "edit_request": "#d97706", "payment_issues": "#059669", "expression_of_gratitude": "#db2777", "money_hesitancy": "#ea580c", "payment_cant_pay": "#059669", "general_question": "#0891b2"};
const CONCERN_ORDER = ["cant_access_song", "general_faq", "feature_request", "other", "download_issue", "product_issues", "edit_request", "payment_issues", "expression_of_gratitude", "money_hesitancy", "payment_cant_pay", "general_question"];

const STATE_KEY = 'reactive-rules-state';
let state = loadState();
let currentFilter = 'all';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STATE_KEY) || '{}'); }
  catch { return {}; }
}

function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
  // Persist to server
  fetch('/api/state', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(state)
  }).catch(() => {});
  updateProgress();
  showToast();
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function getRuleKey(rule) {
  return rule.concern_type + '::' + rule.sub_scenario;
}

function getRuleState(rule) {
  return state[getRuleKey(rule)] || {};
}

function setRuleStatus(rule, status) {
  const key = getRuleKey(rule);
  if (!state[key]) state[key] = {};
  state[key].status = status;
  saveState();
  renderAll();
}

function setRuleEdit(rule, field, value) {
  const key = getRuleKey(rule);
  if (!state[key]) state[key] = {};
  if (!state[key].edits) state[key].edits = {};
  state[key].edits[field] = value;
  saveState();
}

function setRuleFeedback(rule, text) {
  const key = getRuleKey(rule);
  if (!state[key]) state[key] = {};
  state[key].feedback = text;
  saveState();
}

function updateProgress() {
  const total = RULES.length;
  const reviewed = RULES.filter(r => {
    const s = getRuleState(r);
    return s.status === 'approved' || s.status === 'rejected';
  }).length;
  const approved = RULES.filter(r => getRuleState(r).status === 'approved').length;
  const rejected = RULES.filter(r => getRuleState(r).status === 'rejected').length;
  const unreviewed = total - reviewed;
  
  const pct = Math.round((reviewed / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = reviewed + ' / ' + total + ' reviewed';
  document.getElementById('count-unreviewed').textContent = unreviewed;
  document.getElementById('count-approved').textContent = approved;
  document.getElementById('count-rejected').textContent = rejected;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter-' + f).classList.add('active');
  renderAll();
}

function shouldShowRule(rule) {
  const s = getRuleState(rule);
  if (currentFilter === 'all') return true;
  if (currentFilter === 'unreviewed') return !s.status;
  if (currentFilter === 'approved') return s.status === 'approved';
  if (currentFilter === 'rejected') return s.status === 'rejected';
  if (currentFilter === 'uncertain') return rule.confidence === 'uncertain';
  return true;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function renderAll() {
  const container = document.getElementById('container');
  container.innerHTML = '';
  
  // Group rules by concern type
  const groups = {};
  CONCERN_ORDER.forEach(ct => groups[ct] = []);
  RULES.forEach((r, i) => {
    r._index = i;
    if (!groups[r.concern_type]) groups[r.concern_type] = [];
    groups[r.concern_type].push(r);
  });
  
  CONCERN_ORDER.forEach(ct => {
    const rules = groups[ct];
    if (!rules || rules.length === 0) return;
    
    const visibleRules = rules.filter(shouldShowRule);
    if (visibleRules.length === 0 && currentFilter !== 'all') return;
    
    const section = document.createElement('div');
    section.className = 'section';
    
    // Section progress dots
    const dots = rules.map(r => {
      const s = getRuleState(r);
      const cls = s.status === 'approved' ? 'approved' : s.status === 'rejected' ? 'rejected' : '';
      return `<div class="section-progress-dot ${cls}"></div>`;
    }).join('');
    
    const isOpen = visibleRules.length > 0;
    
    section.innerHTML = `
      <div class="section-header" onclick="toggleSection('${ct}')">
        <div class="section-dot" style="background:${COLORS[ct] || '#6b7280'}"></div>
        <div class="section-title">${LABELS[ct] || ct}</div>
        <div class="section-count">${visibleRules.length} of ${rules.length}</div>
        <div class="section-progress">${dots}</div>
        <div class="section-chevron ${isOpen ? 'open' : ''}" id="chevron-${ct}">&#9654;</div>
      </div>
      <div class="section-body ${isOpen ? 'open' : ''}" id="body-${ct}">
        <div class="bulk-actions">
          <button class="bulk-btn" onclick="bulkApprove('${ct}', 'consistent')">Approve all consistent</button>
          <button class="bulk-btn" onclick="bulkApprove('${ct}', 'all')">Approve all</button>
        </div>
        ${visibleRules.map(r => renderRule(r)).join('')}
      </div>
    `;
    
    container.appendChild(section);
  });
  
  updateProgress();
}

function toggleSection(ct) {
  const body = document.getElementById('body-' + ct);
  const chev = document.getElementById('chevron-' + ct);
  if (body) body.classList.toggle('open');
  if (chev) chev.classList.toggle('open');
}

function bulkApprove(ct, scope) {
  RULES.forEach(r => {
    if (r.concern_type !== ct) return;
    if (scope === 'consistent' && r.confidence !== 'consistent') return;
    const s = getRuleState(r);
    if (!s.status) { // only unreviewed
      setRuleStatus(r, 'approved');
    }
  });
  // Already saves + re-renders via setRuleStatus
}

function renderRule(rule) {
  const s = getRuleState(rule);
  const status = s.status || '';
  const edits = s.edits || {};
  const feedback = s.feedback || '';
  const idx = rule._index;
  
  const whenText = edits.when || rule.when;
  const thenText = edits.then || rule.then;
  
  const confTag = rule.confidence === 'consistent' ? 'tag-consistent'
    : rule.confidence === 'uncertain' ? 'tag-uncertain' : 'tag-singleton';
  
  let examplesHtml = '';
  const maxExamples = Math.min(rule.example_quotes?.length || 0, rule.example_responses?.length || 0, 3);
  for (let i = 0; i < maxExamples; i++) {
    examplesHtml += `
      <div class="example-pair">
        <div class="example-customer">"${escapeHtml(rule.example_quotes[i])}"</div>
        <div class="example-response">${escapeHtml(rule.example_responses[i])}</div>
      </div>
    `;
  }
  // Show quotes without responses
  if (maxExamples === 0 && rule.example_quotes?.length > 0) {
    for (let i = 0; i < Math.min(rule.example_quotes.length, 3); i++) {
      examplesHtml += `
        <div class="example-pair">
          <div class="example-customer">"${escapeHtml(rule.example_quotes[i])}"</div>
          <div class="example-response" style="color:var(--muted);font-style:italic">No response recorded</div>
        </div>
      `;
    }
  }
  
  return `
    <div class="rule-card ${status}" id="rule-${idx}">
      <div class="rule-header">
        <div class="rule-scenario">${escapeHtml(rule.sub_scenario.replace(/_/g, ' '))}</div>
        <div class="rule-tags">
          <span class="tag ${confTag}">${rule.confidence}</span>
          <span class="tag" style="background:#f3f4f6;color:var(--muted)">${rule.example_count || 0}x</span>
        </div>
      </div>
      
      <div class="rule-when" id="when-display-${idx}">
        <div class="rule-when-label">When</div>
        ${escapeHtml(whenText)}
      </div>
      
      <div class="rule-then" id="then-display-${idx}">
        <div class="rule-then-label">Then</div>
        ${escapeHtml(thenText)}
      </div>
      
      ${rule.notes ? `<div class="rule-notes">${escapeHtml(rule.notes)}</div>` : ''}
      
      ${examplesHtml ? `
        <button class="rule-examples-toggle" onclick="toggleExamples(${idx})">
          Show examples &#9662;
        </button>
        <div class="rule-examples" id="examples-${idx}">
          ${examplesHtml}
        </div>
      ` : ''}
      
      <div class="rule-feedback">
        <textarea placeholder="Notes / edits / feedback on this rule..." 
          id="feedback-${idx}"
          onchange="setRuleFeedback(RULES[${idx}], this.value)"
        >${escapeHtml(feedback)}</textarea>
      </div>
      
      <div class="rule-actions">
        <button class="action-btn btn-approve ${status === 'approved' ? 'active' : ''}" 
          onclick="setRuleStatus(RULES[${idx}], '${status === 'approved' ? '' : 'approved'}')">
          &#10003; Approve
        </button>
        <button class="action-btn btn-reject ${status === 'rejected' ? 'active' : ''}"
          onclick="setRuleStatus(RULES[${idx}], '${status === 'rejected' ? '' : 'rejected'}')">
          &#10007; Reject
        </button>
        <div class="action-spacer"></div>
        <button class="action-btn btn-edit" onclick="startEdit(${idx})">
          &#9998; Edit
        </button>
      </div>
    </div>
  `;
}

function toggleExamples(idx) {
  const el = document.getElementById('examples-' + idx);
  if (el) el.classList.toggle('open');
}

function startEdit(idx) {
  const rule = RULES[idx];
  const s = getRuleState(rule);
  const edits = s.edits || {};
  const card = document.getElementById('rule-' + idx);
  card.classList.add('editing');
  
  const whenEl = document.getElementById('when-display-' + idx);
  const thenEl = document.getElementById('then-display-' + idx);
  
  const whenText = edits.when || rule.when;
  const thenText = edits.then || rule.then;
  
  whenEl.innerHTML = `
    <div class="rule-when-label">When (editing)</div>
    <textarea class="edit-textarea" id="edit-when-${idx}">${escapeHtml(whenText)}</textarea>
  `;
  thenEl.innerHTML = `
    <div class="rule-then-label">Then (editing)</div>
    <textarea class="edit-textarea" id="edit-then-${idx}">${escapeHtml(thenText)}</textarea>
    <div class="edit-actions">
      <button class="edit-cancel" onclick="cancelEdit(${idx})">Cancel</button>
      <button class="edit-save" onclick="saveEdit(${idx})">Save Edits</button>
    </div>
  `;
}

function cancelEdit(idx) {
  renderAll();
}

function saveEdit(idx) {
  const rule = RULES[idx];
  const whenVal = document.getElementById('edit-when-' + idx)?.value;
  const thenVal = document.getElementById('edit-then-' + idx)?.value;
  if (whenVal) setRuleEdit(rule, 'when', whenVal);
  if (thenVal) setRuleEdit(rule, 'then', thenVal);
  // Auto-approve on edit
  setRuleStatus(rule, 'approved');
}

// Load server state on init
(async function() {
  try {
    const resp = await fetch('/api/state');
    const serverState = await resp.json();
    const localState = loadState();
    let merged = false;
    for (const key of Object.keys(serverState)) {
      if (!localState[key]) {
        localState[key] = serverState[key];
        merged = true;
      }
    }
    if (merged) {
      state = localState;
      localStorage.setItem(STATE_KEY, JSON.stringify(state));
    }
  } catch {}
  renderAll();
})();
</script>
